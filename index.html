<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 스마트 학사관리 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border-heavy: #868e96; /* 진한 회색 2px용 */
            --text-main: #1a1d23;
            --text-muted: #495057;
            --accent: #339af0;
            --sat-bg: #e7f5ff; /* 토요일 연파랑 */
            --sun-bg: #fff5f5; /* 일요일 연분홍 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ===== Header ===== */
        .header-wrapper { background: #fff; z-index: 1000; border-bottom: 2px solid var(--border-heavy); padding: 8px 20px; flex-shrink: 0; }
        .header { max-width: 1600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .header h1 { font-size: 18px; font-weight: 900; color: #212529; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .controls { display: flex; gap: 4px; background: #e9ecef; padding: 3px; border-radius: 10px; border: 2px solid var(--border-heavy); }
        .btn { background: transparent; color: var(--text-muted); border: none; padding: 5px 12px; border-radius: 6px; font-weight: 800; font-size: 13.5px; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .btn:hover { background: #dee2e6; color: var(--text-main); }
        .btn.active { background: var(--border-heavy); color: #fff; }

        /* 메인 컨테이너 */
        .container { 
            flex-grow: 1; 
            padding: 10px 20px; 
            display: flex; 
            flex-direction: column; 
            min-height: 0; 
            overflow-y: auto; 
            max-width: 1400px; /* 너무 넓어지지 않게 제한 */
            margin: 0 auto;    /* 중앙 정렬 */
            width: 100%;
        }
        /* ===== Common Month Selector ===== */
        .month-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 8px; flex-shrink: 0; }
        .month-title { font-size: 20px; font-weight: 900; color: #212529; min-width: 130px; text-align: center; }

        /* ===== Tab 1: 달력형 ===== */
        .calendar-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; padding: 6px; background: #fff; border-radius: 8px; border: 2px solid var(--border-heavy); flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.1); }

        .calendar-wrapper { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: auto repeat(5, 1fr); gap: 6px; flex-grow: 1; min-height: 0; }
        .cal-head { padding: 5px; text-align: center; font-weight: 900; color: #212529; font-size: 13px; background: #f1f3f5; border: 2px solid var(--border-heavy); border-radius: 5px; }
        
        .cal-cell { background: #fff; border: 2px solid var(--border-heavy); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; overflow-y: auto; min-height: 0; }
        .cal-cell.today { background: #fff9db; border-color: #fcc419; border-width: 3px; }
        .cal-cell.other-month { opacity: 0.3; background: #f8f9fa; }
        .cal-date { font-size: 15px; font-weight: 900; margin-bottom: 5px; position: sticky; top: 0; background: inherit; z-index: 2; }
        .cal-ev { font-size: 11px; padding: 3px 5px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; font-weight: 800; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }

        /* ===== Tab 2: 월중계획표 (A4 최적화) ===== */
        .table-container { flex-grow: 1; min-height: 0; overflow-y: auto; border: 2px solid var(--border-heavy); border-radius: 8px; }
        .plan-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; table-layout: fixed; }
        
        /* 밴드고정 방지: 헤더 완전 고정 */
        .plan-table thead th { 
            position: sticky; top: 0; z-index: 100; 
            background: #e9ecef; border-bottom: 2px solid var(--border-heavy); border-right: 2px solid var(--border-heavy);
            padding: 8px 4px; font-weight: 900; font-size: 14px; color: #000;
        }
        .plan-table thead th:last-child { border-right: none; }
        
        .plan-table td { border-bottom: 2px solid var(--border-heavy); border-right: 2px solid var(--border-heavy); padding: 4px; text-align: center; vertical-align: middle; height: 50px; }
        .plan-table td:last-child { border-right: none; }
        .plan-table tr:last-child td { border-bottom: none; }

        /* 행사 내용 블럭(Pill) 처리 */
        .event-container { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px; }
        .event-pill { 
            display: inline-flex; align-items: center; gap: 4px; 
            background: #f1f3f5; border: 1px solid rgba(0,0,0,0.1);
            padding: 4px 10px; border-radius: 20px; font-size: 14px; font-weight: 800;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .dept-icon { font-size: 10px; padding: 2px 6px; border-radius: 10px; color: #fff; background: var(--border-heavy); white-space: nowrap; }

        /* 요일 색상 */
        .row-sun { background-color: var(--sun-bg); color: #c92a2a; }
        .row-sat { background-color: var(--sat-bg); color: #1864ab; }

        /* 기도/말씀 3줄 */
        .prayer-box { text-align: center; line-height: 1.1; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .prayer-name { font-size: 15px; font-weight: 950; color: #000; margin-bottom: 1px; }
        .prayer-sub { font-size: 10.5px; color: #495057; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ===== Tab 3: 부서별 조회 ===== */
        .dept-month-title { font-size: 18px; font-weight: 900; color: #212529; padding: 8px 0; border-bottom: 4px solid var(--border-heavy); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; margin-top: 20px; }
        .dept-card { background: #fff; border: 2px solid var(--border-heavy); border-radius: 12px; padding: 15px; }

        /* ===== Loading ===== */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 5px solid #e9ecef; border-top-color: var(--border-heavy); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            body { overflow: visible; height: auto; }
            .header-wrapper, .month-selector, .no-print, .calendar-legend { display: none !important; }
            .container { height: auto; padding: 0; overflow: visible; }
            .table-container { border: 3px solid #000; border-radius: 0; height: auto; overflow: visible; }
            .plan-table { border: none; width: 100%; }
            .plan-table thead th { position: static; border: 2px solid #000 !important; background: #eee !important; color: #000; }
            .plan-table td { border: 2px solid #000 !important; height: auto; color: #000; padding: 4px !important; }
            .event-pill { border: 1px solid #000; background: #fff !important; }
            .dept-icon { border: 1px solid #000; color: #000 !important; background: #eee !important; }
            .print-title { display: block !important; text-align: center; font-size: 20px; font-weight: 900; margin-bottom: 10px; text-decoration: underline; }
            @page { size: A4 landscape; margin: 10mm; }
        }
        .print-title { display: none; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-weight:900; font-size:16px; color:#495057; margin-top:15px;">학사 시스템 동기화 중...</div>
</div>

<div class="header-wrapper no-print">
    <div class="header">
        <h1 onclick="location.reload()">📅 학사관리 시스템</h1>
        <div class="controls">
            <button class="btn active" id="btn_calendar" onclick="switchTab('calendar')">🗓️ 달력 일정</button>
            <button class="btn" id="btn_plan" onclick="switchTab('plan')">📋 월중 계획표</button>
            <button class="btn" id="btn_dept" onclick="switchTab('dept')">🏢 부서별 조회</button>
        </div>
    </div>
</div>

<div class="container" id="mainContainer"></div>

<script>
    const SHEET_ID = '10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg';
    const FIXED_DEPTS = ["교목부", "교무부", "연구부", "상담부", "정보부", "1학년부", "2학년부", "3학년부", "기획위원", "행정실", "국어과", "영어과", "수학과", "사회과", "과학과", "예체능과", "정보과", "외국어과", "기타"];
    
    let scheduleData = [];   
    let supervisorMap = {};  
    let prayerMap = {};      
    let deptColors = {};
    let dataLoaded = 0;

    const PASTELS = ['#ffec99', '#b2f2bb', '#a5d8ff', '#d0bfff', '#ffc9c9', '#c5f6fa', '#ffdeeb', '#e9ecef', '#d3f9d8', '#fff3bf', '#f1f3f5'];
    FIXED_DEPTS.forEach((d, i) => { deptColors[d] = PASTELS[i % PASTELS.length]; });

    function parseGDate(v) {
        if (!v || typeof v !== 'string' || !v.includes('Date')) return null;
        const parts = v.match(/\d+/g);
        return new Date(parts[0], parts[1], parts[2]);
    }

    // 1. 학사일정 파싱
    window.cb_schedule = function(data) {
        data.table.rows.forEach(r => {
            if (!r.c || !r.c[0]) return;
            const date = parseGDate(r.c[0].v);
            const content = r.c[2] ? String(r.c[2].v).trim() : "";
            if (date && content && content !== "null") {
                const dayEvents = content.split('\n').filter(l => l.trim() && l !== "null" && l !== "익").map(line => {
                    const deptMatch = line.match(/^\[([^\]]+)\]/);
                    let deptName = deptMatch ? deptMatch[1].trim() : '기타';
                    let text = deptMatch ? line.replace(deptMatch[0], '').trim() : line.trim();
                    if (!FIXED_DEPTS.includes(deptName)) { deptName = '기타'; text = line; }
                    return { dept: deptName, text: text };
                });
                if(dayEvents.length > 0) scheduleData.push({ date, events: dayEvents });
            }
        });
        checkReady();
    };

    // 2. 자습감독 파싱
    window.cb_super = function(data) {
        data.table.rows.forEach(r => {
            if (!r.c || !r.c[0]) return;
            const date = parseGDate(r.c[0].v);
            const name = r.c[2] ? String(r.c[2].v).trim() : "";
            if (date && name && name !== "null") supervisorMap[date.toISOString().split('T')[0]] = name;
        });
        checkReady();
    };

    // 3. 기도순서 파싱
    window.cb_prayer = function(data) {
        data.table.rows.forEach((r, i) => {
            if (i < 1 || !r.c || !r.c[0]) return; // 첫 줄(헤더)만 제외
            const dateObj = parseGDate(r.c[0].v);
            if (!dateObj) return;
            
            const dateKey = dateObj.toISOString().split('T')[0];
            const name = r.c[2] ? String(r.c[2].v).trim() : ""; // C열: 성명
            const bible = r.c[3] ? String(r.c[3].v).trim() : ""; // D열: 말씀
            const hymn = r.c[4] ? String(r.c[4].v).trim() : "";  // E열: 찬송
            
            if (name && name !== "null") {
                prayerMap[dateKey] = { name, hymn, bible };
            }
        });
        checkReady();
    };

    function checkReady() {
        dataLoaded++;
        if (dataLoaded >= 3) {
            document.getElementById('loadingOverlay').style.display = 'none';
            switchTab('calendar');
        }
    }

    function fetchAll() {
        const sheets = [{gid:'0',cb:'cb_schedule'}, {gid:'1459415616',cb:'cb_super'}, {gid:'1697887995',cb:'cb_prayer'}];
        sheets.forEach(s => {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${s.cb}&gid=${s.gid}&_=${Date.now()}`;
            document.body.appendChild(script);
        });
    }
    fetchAll();

    let currentTab = 'calendar';
    let viewDate = new Date();

    function switchTab(id) {
        currentTab = id;
        document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + id).classList.add('active');
        render();
    }

    function render() {
        const mc = document.getElementById('mainContainer');
        mc.innerHTML = '';
        if(currentTab === 'calendar') renderCalendar(mc);
        else if(currentTab === 'plan') renderPlan(mc);
        else if(currentTab === 'dept') renderDept(mc);
    }

    window.changeMonth = (v) => { viewDate.setMonth(viewDate.getMonth() + v); render(); };
    window.goDept = (deptName) => { window._selDept = deptName; switchTab('dept'); };

	function renderCalendar(c) {
	    const y = viewDate.getFullYear(), m = viewDate.getMonth();
	    const now = new Date(); // 오늘 날짜 객체 생성
	
	    let html = `<div class="calendar-legend no-print">${FIXED_DEPTS.map(d => `<div class="legend-item"><div class="legend-dot" style="background:${deptColors[d]}"></div>${d}</div>`).join('')}</div><div class="month-selector no-print"><button class="btn" onclick="changeMonth(-1)">◀ 이전</button><div class="month-title">${y}년 ${m + 1}월</div><button class="btn" onclick="changeMonth(1)">다음 ▶</button></div><div class="calendar-wrapper"><div class="calendar-grid">${['월','화','수','목','금'].map(d => `<div class="cal-head">${d}</div>`).join('')}`;
	    
	    const firstDay = new Date(y, m, 1), lastDay = new Date(y, m + 1, 0);
	    let curr = new Date(firstDay);
	    let diff = curr.getDay() - 1; if(diff === -1) diff = 6;
	    curr.setDate(curr.getDate() - diff);
	
	    for(let i=0; i<35; i++) {
	        const dStr = curr.toISOString().split('T')[0];
	        const isThisMonth = curr.getMonth() === m;
	        
	        // 중요: 시간 정보를 제외하고 날짜만 비교 (오늘 하이라이트 로직)
	        const isToday = curr.getFullYear() === now.getFullYear() && 
	                        curr.getMonth() === now.getMonth() && 
	                        curr.getDate() === now.getDate();
	
	        if(curr.getDay() !== 0 && curr.getDay() !== 6) {
	            const dayData = scheduleData.find(x => x.date.toISOString().split('T')[0] === dStr);
	            html += `<div class="cal-cell ${!isThisMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}"><div class="cal-date">${curr.getDate()}</div>${dayData ? dayData.events.map(e => `<div 	class="cal-ev" style="background:${deptColors[e.dept]}" onclick="goDept('${e.dept}')">${e.text}</div>`).join('') : ''}</div>`;
	        }
	        curr.setDate(curr.getDate() + 1); if(curr > lastDay && curr.getDay() === 1) break;
	    }
	    c.innerHTML = html + `</div></div>`;
	}

    /* --- Tab 2: 월중계획표 (Pill 형태 적용) --- */
    function renderPlan(c) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const lastDay = new Date(y, m + 1, 0).getDate();
        let html = `<div class="month-selector no-print"><button class="btn" onclick="changeMonth(-1)">◀ 이전</button><div class="month-title">${y}년 ${m + 1}월</div><button class="btn" onclick="changeMonth(1)">다음 ▶</button><button class="btn active" style="margin-left:20px; background:var(--border-heavy);" onclick="window.print()">🖨️ 인쇄</button></div><div class="print-title">${y}학년도 ${m + 1}월중 학사운영 계획</div><div class="table-container"><table class="plan-table"><thead><tr><th style="width:60px">날짜</th><th style="width:45px">요일</th><th>주요 행사 내용 (클릭 시 부서별 조회)</th><th style="width:140px">기도/말씀</th><th style="width:140px">자습감독</th></tr></thead><tbody>`;
        const days = ['일','월','화','수','목','금','토'];
        for(let d=1; d<=lastDay; d++) {
            const date = new Date(y, m, d), dISO = date.toISOString().split('T')[0], dName = days[date.getDay()];
            const dayData = scheduleData.find(x => x.date.toISOString().split('T')[0] === dISO);
            const prayer = prayerMap[dISO] || {name:"", hymn:"", bible:""};
            const rowClass = date.getDay()===0 ? 'row-sun' : date.getDay()===6 ? 'row-sat' : '';
            
            html += `<tr class="${rowClass}">
                <td style="font-weight:900; font-size:16px;">${m+1}.${d}</td>
                <td style="font-weight:800;">${dName}</td>
                <td class="align-left">
                    <div class="event-container">
                        ${dayData ? dayData.events.map(e => `
                            <div class="event-pill" style="background:${deptColors[e.dept]}aa" onclick="goDept('${e.dept}')">
                                <span class="dept-icon" style="background:${deptColors[e.dept].replace(/f|c|e|d/g,'8')}">${e.dept}</span>
                                <span>${e.text}</span>
                            </div>
                        `).join('') : ''}
                    </div>
                </td>
                <td>
                    <div class="prayer-box">
                        <span class="prayer-name">${prayer.name ? prayer.name : ''}</span>
                        <span class="prayer-sub">${prayer.hymn}</span>
                        <span class="prayer-sub">${prayer.bible}</span>
                    </div>
                </td>
                <td style="font-size:16px; font-weight:900;">${supervisorMap[dISO] || ""}</td>
            </tr>`;
        }
        c.innerHTML = html + `</tbody></table></div>`;
    }

/* --- Tab 3: 부서별 조회 (정렬 오류 수정 및 리밋 적용) --- */
    function renderDept(c) {
        if(!window._selDept) window._selDept = FIXED_DEPTS[0];

        // 1. 해당 부서 일정 필터링 및 날짜순 정렬
        const filtered = scheduleData
            .filter(day => day.events.some(e => e.dept === window._selDept))
            .sort((a, b) => a.date - b.date);

        // 2. 월별 그룹화 (정렬된 상태 유지)
        const monthGroups = {};
        const orderedMonthKeys = []; // 정렬된 월 키를 저장할 배열

        filtered.forEach(item => {
            const mKey = `${item.date.getFullYear()}년 ${item.date.getMonth() + 1}월`;
            if (!monthGroups[mKey]) {
                monthGroups[mKey] = [];
                orderedMonthKeys.push(mKey); // 처음 나타나는 월부터 순서대로 삽입
            }
            monthGroups[mKey].push(item);
        });

        // 3. HTML 생성 (중앙 정렬 리밋 적용)
        let html = `<div class="limit-wrapper">`;
        
        // 부서 선택 셀렉트 박스
        html += `
            <div class="month-selector no-print" style="justify-content:flex-start;">
                <label style="font-weight:900; font-size:16px; margin-right:15px;">🏢 부서 선택:</label>
                <select class="btn" style="border:2px solid var(--border-heavy); background:#fff; padding:8px 15px; font-size:15px; color:#212529" 
                        onchange="window._selDept=this.value; render();">
                    ${FIXED_DEPTS.map(d => `<option value="${d}" ${window._selDept === d ? 'selected' : ''}>${d}</option>`).join('')}
                </select>
            </div>`;

        if (orderedMonthKeys.length === 0) {
            html += `<div style="text-align:center; padding:80px; color:#868e96; font-weight:800; font-size:18px; border:2px dashed var(--border-heavy); border-radius:15px; margin-top:20px;">일정이 없습니다.</div>`;
        } else {
            // 정렬된 월 순서대로 출력
            orderedMonthKeys.forEach(mKey => {
                html += `<div class="dept-month-title">${mKey}</div>
                         <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:12px; margin-bottom:30px;">`;
                
                monthGroups[mKey].forEach(item => {
                    const days = ['일', '월', '화', '수', '목', '금', '토'];
                    const events = item.events.filter(e => e.dept === window._selDept);
                    
                    html += `
                        <div class="dept-card" style="border-left: 8px solid ${deptColors[window._selDept]}">
                            <div class="dept-card-date" style="font-weight:900; color:var(--text-muted); margin-bottom:8px;">
                                ${item.date.getMonth() + 1}월 ${item.date.getDate()}일 (${days[item.date.getDay()]})
                            </div>
                            ${events.map(e => `<div style="font-weight:800; font-size:16px; margin-bottom:5px; color:#212529; line-height:1.4;">• ${e.text}</div>`).join('')}
                        </div>`;
                });
                html += `</div>`;
            });
        }

        html += `</div>`; // .limit-wrapper 닫기
        c.innerHTML = html;
    }
</script>
</body>
</html>
