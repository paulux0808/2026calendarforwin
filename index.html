<style>
:root{--bg:#f3f6fb;--panel:#fff;--panel2:#eef3f9;--line:#d8e0eb;--text:#172033;--muted:#667085;--primary:#2563eb;--primary2:#dbeafe;--danger:#dc2626;--today:#fff7cc;--sat:#e8f3ff;--sun:#ffe9ea;--shadow:0 12px 34px rgba(15,23,42,.08);--radius:18px;--font:14px}

*{box-sizing:border-box}html,body{margin:0;height:100%}body{font-family:Pretendard,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:var(--font);overflow:hidden}.app{height:100%;display:grid;grid-template-rows:auto 1fr}.top{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 18px;z-index:20}.toprow{max-width:1600px;margin:auto;display:flex;align-items:center;gap:12px}.brand{font-size:20px;font-weight:900;white-space:nowrap}.status{font-size:12px;color:var(--muted);white-space:nowrap}.search{flex:1;min-width:180px;position:relative}.search input{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:12px;padding:10px 38px 10px 12px;font:inherit}.search button{position:absolute;right:4px;top:4px;border:0;background:transparent;color:var(--muted);font-size:18px;cursor:pointer}.tools{display:flex;gap:6px}.iconbtn,.btn,.tab{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:11px;padding:9px 11px;font:inherit;font-weight:800;cursor:pointer}.iconbtn:hover,.btn:hover,.tab:hover{background:var(--panel2)}.nav{max-width:1600px;margin:10px auto 0;display:flex;gap:7px;overflow:auto;padding-bottom:2px}.tab{white-space:nowrap}.tab.active{background:var(--primary);border-color:var(--primary);color:#fff}.main{overflow:auto;padding:18px}.wrap{max-width:1500px;margin:auto}.banner{display:none;background:#fff1f2;color:#9f1239;border:1px solid #fda4af;border-radius:14px;padding:12px 14px;margin-bottom:12px;font-weight:800}.banner.show{display:flex;justify-content:space-between;gap:12px;align-items:center}.hero{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.hero h2{margin:0;font-size:24px}.hero .actions{display:flex;gap:7px;flex-wrap:wrap}.monthnav{display:flex;align-items:center;gap:7px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}.summary .card{padding:14px}.summary b{display:block;font-size:23px;margin-top:4px}.muted{color:var(--muted)}.calendar{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));gap:8px;min-width:920px}.calendarbox{overflow:auto}.dow{font-weight:900;text-align:center;padding:9px}.day{min-height:150px;padding:9px;border:1px solid var(--line);background:var(--panel);border-radius:14px}.day.other{opacity:.42}.day.today{background:var(--today);outline:3px solid #fbbf24}.date{display:flex;justify-content:space-between;font-weight:900;margin-bottom:7px}.sun{background:var(--sun)}.sat{background:var(--sat)}.event{display:flex;align-items:flex-start;gap:5px;padding:4px 0;cursor:pointer;line-height:1.35}.event:hover .et{text-decoration:underline}.tag{font-size:10px;font-weight:900;color:#111;border:1px solid rgba(0,0,0,.12);border-radius:5px;padding:2px 5px;white-space:nowrap}.tablewrap{overflow:auto}.table{width:100%;border-collapse:separate;border-spacing:0;min-width:800px}.table th,.table td{padding:9px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:top}.table th{position:sticky;top:0;background:var(--panel2);z-index:2}.table tr:last-child td{border-bottom:0}.table th:last-child,.table td:last-child{border-right:0}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.filters select,.filters input,.form input,.form select,.form textarea{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:11px;padding:10px 12px;font:inherit}.filters select{min-width:160px}.deptgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}.deptcard{padding:15px;border-left:7px solid var(--primary)}.deptcard h3{margin:0 0 8px}.empty{text-align:center;padding:60px 20px;color:var(--muted);font-weight:800}.notice{padding:14px;margin-bottom:12px}.request{max-width:720px;margin:auto;padding:22px}.form{display:grid;gap:12px}.form label{font-weight:900}.form textarea{min-height:150px;resize:vertical}.primary{background:var(--primary);color:#fff;border-color:var(--primary)}.modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modal.show{display:flex}.modalbox{width:min(660px,100%);max-height:80vh;overflow:auto;background:var(--panel);border-radius:20px;border:1px solid var(--line);box-shadow:var(--shadow)}.modalhead,.modalfoot{padding:15px 18px;border-bottom:1px solid var(--line)}.modalfoot{border-bottom:0;border-top:1px solid var(--line);display:flex;justify-content:flex-end}.modalbody{padding:18px;white-space:pre-wrap;line-height:1.7}.loading{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;font-weight:900}.spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.toprow{flex-wrap:wrap}.brand{font-size:18px}.status{order:3;width:100%}.summary{grid-template-columns:repeat(2,1fr)}.main{padding:12px}.hero{align-items:flex-start;flex-direction:column}.calendar{grid-template-columns:1fr;min-width:0}.dow{display:none}.day{min-height:auto}.day.other{display:none}.nav{margin-top:8px}.tools .label{display:none}}
@media print{body{overflow:visible;background:#fff;color:#000}.top,.banner,.hero .actions,.filters{display:none!important}.main{overflow:visible;padding:0}.card{box-shadow:none;border-radius:0}.calendar{min-width:0;gap:2px}.day{min-height:120px;border-radius:0}.table th{position:static}@page{size:A4 portrait;margin:8mm}}

<body>
<div class="loading" id="loading"><span class="spin"></span>학사 데이터를 불러오는 중입니다.</div>
<div class="app">
<header class="top"><div class="toprow"><div class="brand">학사 캘린더</div><div class="status" id="syncStatus">동기화 준비</div><div class="search"><input id="search" placeholder="일정·부서·내용 검색 (공백은 AND)" aria-label="통합 검색"><button id="clearSearch" title="검색 지우기">×</button></div><div class="tools"><button class="iconbtn" id="refreshBtn">↻ <span class="label">새로고침</span></button><button class="iconbtn" id="fontBtn">A+</button><button class="iconbtn" id="themeBtn">◐</button></div></div><nav class="nav" id="nav"><button class="tab active" data-tab="calendar">달력</button><button class="tab" data-tab="plan">월중 계획표</button><button class="tab" data-tab="student">학생일정</button><button class="tab" data-tab="dept">부서별</button><button class="tab" data-tab="nuga">누가기록</button><button class="tab" data-tab="request">수정 요청</button></nav></header>
<main class="main"><div class="wrap"><div class="banner" id="banner"><span id="bannerText"></span><button class="btn" id="hideBanner">닫기</button></div><section id="content"></section></div></main>
</div>
<div class="modal" id="modal"><div class="modalbox"><div class="modalhead"><strong id="modalTitle">상세</strong></div><div class="modalbody" id="modalBody"></div><div class="modalfoot"><button class="btn primary" id="modalClose">닫기</button></div></div></div>
<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzk1DN0iDS7EdZvKq-iomzgxmiCzOwCUZwWZkN4fjvkzOZPdF1d3P9d1xt6Ii8VNnmmPQ/exec";
const SHEET_ID="10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg";
const STUDENT_SCHEDULE_GID="1112677469";
const SHEETS=[['schedule','0','연중행사계획'],['student',STUDENT_SCHEDULE_GID,'학생일정'],['super','1459415616','자습감독'],['prayer','1697887995','기도순서'],['notice','1487091944','공지사항'],['nuga','2041576858','창체누가기록']];
const DEPTS=["교목부","교무부","연구부","상담부","정보부","1학년부","2학년부","3학년부","기획위원","행정실","국어과","영어과","수학과","사회과","과학과","예체능과","정보과","외국어과","기타"];
const COLORS=['#ffd6a5','#caffbf','#9bf6ff','#a0c4ff','#bdb2ff','#ffc6ff','#ffadad','#fde68a','#bfdbfe','#ddd6fe','#fecdd3','#bbf7d0','#bae6fd','#fed7aa','#e9d5ff','#fbcfe8','#d1fae5','#e5e7eb','#cbd5e1'];
const state={tab:'calendar',view:new Date(new Date().getFullYear(),new Date().getMonth(),1),query:'',font:0,loaded:new Set(),failed:new Set(),schedule:[],student:[],super:{},prayer:{},notice:[],nuga:[],events:[],studentEvents:[],lastSync:null};
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function parseDate(v){if(!v)return null;if(v instanceof Date)return v;if(typeof v==='number'){const u=new Date(Math.round((v-25569)*86400000));return new Date(u.getUTCFullYear(),u.getUTCMonth(),u.getUTCDate())}const s=String(v);let m=s.match(/Date\s*\(\s*(\d{4})\s*,\s*(\d{1,2})\s*,\s*(\d{1,2})/);if(m)return new Date(+m[1],+m[2],+m[3]);m=s.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):null}
function cell(c){if(c==null)return'';if(typeof c!=='object')return String(c).trim();return String(c.f??c.v??'').trim()}
function tokens(){return state.query.toLowerCase().split(/\s+/).filter(Boolean)}function match(...xs){const h=xs.join(' ').toLowerCase();return tokens().every(t=>h.includes(t))}
function showBanner(t){$('#bannerText').textContent=t;$('#banner').classList.add('show')}function hideBanner(){$('#banner').classList.remove('show')}
function color(d){return COLORS[Math.max(0,DEPTS.indexOf(d))%COLORS.length]}
function cbSchedule(data){state.schedule=[];(data?.table?.rows||[]).forEach(r=>{const d=parseDate(r.c?.[0]?.v),raw=cell(r.c?.[2]);if(!d||!raw)return;const events=raw.split('\n').map(x=>x.trim()).filter(Boolean).map(line=>{const m=line.match(/^\[([^\]]+)\]/);let dept=m?m[1].trim():'기타',text=m?line.replace(m[0],'').trim():line;if(!DEPTS.includes(dept)){dept='기타';text=line}return{dept,text}});state.schedule.push({date:d,events})});reindex()}
function cbStudent(data){state.student=[];(data?.table?.rows||[]).forEach(r=>{const d=parseDate(r.c?.[0]?.v)||parseDate(cell(r.c?.[0]));if(!d)return;let parts=[];for(let i=2;i<(r.c||[]).length;i++){const t=cell(r.c[i]);if(t&&t!=='null')parts.push(t)}if(!parts.length)for(let i=1;i<(r.c||[]).length;i++){const t=cell(r.c[i]);if(t&&!/^[월화수목금토일]$/.test(t)&&t!=='null')parts.push(t)}const events=parts.join('\n').split('\n').map(x=>x.trim()).filter(Boolean);if(events.length)state.student.push({date:d,events})});reindex()}
function cbSuper(data){state.super={};(data?.table?.rows||[]).forEach(r=>{const d=parseDate(r.c?.[0]?.v),v=cell(r.c?.[2]);if(d&&v)state.super[key(d)]=v})}
function cbPrayer(data){state.prayer={};(data?.table?.rows||[]).forEach(r=>{const d=parseDate(r.c?.[0]?.v);if(d)state.prayer[key(d)]={name:cell(r.c?.[2]),bible:cell(r.c?.[3]),hymn:cell(r.c?.[4])}})}
function cbNotice(data){state.notice=[];(data?.table?.rows||[]).forEach(r=>{const s=parseDate(r.c?.[0]?.v),e=parseDate(r.c?.[1]?.v),text=cell(r.c?.[2]);if(s&&e&&text)state.notice.push({s,e,text})})}
function cbNuga(data){state.nuga=[];(data?.table?.rows||[]).forEach(r=>{const c=r.c||[],cat=cell(c[1]),d=parseDate(c[2]?.v)||parseDate(cell(c[2])),period=cell(c[3]),content=cell(c[7]),remark=cell(c[8]);if(!cat||!d)return;const hours=(period.replace(/교시|\[|\]|\s/g,'').split(/[,.，、\/|~\-–—]+/).filter(x=>/^\d+$/.test(x))).length;state.nuga.push({cat,date:d,period,hours,grades:[cell(c[4]),cell(c[5]),cell(c[6])],content,remark})});state.nuga.sort((a,b)=>a.date-b.date)}
function reindex(){state.events=[];state.schedule.forEach(x=>x.events.forEach(e=>state.events.push({...e,date:x.date,dateKey:key(x.date)})));state.studentEvents=[];state.student.forEach(x=>x.events.forEach(text=>state.studentEvents.push({text,date:x.date,dateKey:key(x.date)})))}
const callbacks={schedule:cbSchedule,student:cbStudent,super:cbSuper,prayer:cbPrayer,notice:cbNotice,nuga:cbNuga};
function loadAll(){state.loaded.clear();state.failed.clear();$('#loading').style.display='flex';hideBanner();SHEETS.forEach(([name,gid,label])=>{const cb='__cal_'+name+'_'+Date.now()+'_'+Math.random().toString(36).slice(2);let done=false;const finish=ok=>{if(done)return;done=true;clearTimeout(timer);delete window[cb];script.remove();(ok?state.loaded:state.failed).add(name);if(state.loaded.size+state.failed.size===SHEETS.length)finishAll()};window[cb]=data=>{try{callbacks[name](data);finish(true)}catch(e){console.error(e);finish(false)}};const script=document.createElement('script');script.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${gid}&_=${Date.now()}`;script.onerror=()=>finish(false);const timer=setTimeout(()=>finish(false),12000);document.body.appendChild(script)})}
function finishAll(){state.lastSync=new Date();$('#loading').style.display='none';$('#syncStatus').textContent=`${state.lastSync.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 동기화 · ${state.loaded.size}/${SHEETS.length}`;if(state.failed.size)showBanner(`일부 데이터를 불러오지 못했습니다: ${[...state.failed].map(x=>SHEETS.find(s=>s[0]===x)?.[2]).join(', ')}`);if(state.schedule.length){const now=new Date(),future=state.schedule.map(x=>x.date).sort((a,b)=>a-b).find(d=>d>=now)||state.schedule.at(-1).date;state.view=new Date(future.getFullYear(),future.getMonth(),1)}render()}
function header(title){return `<div class="hero"><div><h2>${title}</h2><div class="muted">Google 시트 원본을 읽어 표시합니다.</div></div><div class="actions"><div class="monthnav"><button class="btn" data-month="-1">‹</button><button class="btn" id="todayBtn">오늘</button><button class="btn" data-month="1">›</button></div><button class="btn" onclick="print()">인쇄</button></div></div>`}
function currentNotices(){const n=new Date();n.setHours(0,0,0,0);return state.notice.filter(x=>n>=x.s&&n<=new Date(x.e.getFullYear(),x.e.getMonth(),x.e.getDate(),23,59,59))}
function renderCalendar(){const y=state.view.getFullYear(),m=state.view.getMonth(),first=new Date(y,m,1),start=new Date(y,m,1-first.getDay()),today=key(new Date());let cells='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const dk=key(d),evs=state.events.filter(e=>e.dateKey===dk&&match(e.dept,e.text));const cls=[d.getMonth()!==m?'other':'',dk===today?'today':'',d.getDay()===0?'sun':'',d.getDay()===6?'sat':''].join(' ');cells+=`<div class="day ${cls}"><div class="date"><span>${d.getDate()}</span><span class="muted">${['일','월','화','수','목','금','토'][d.getDay()]}</span></div>${evs.map(e=>`<div class="event" data-detail="event" data-key="${dk}" data-dept="${esc(e.dept)}" data-text="${esc(e.text)}"><span class="tag" style="background:${color(e.dept)}">${esc(e.dept)}</span><span class="et">${esc(e.text)}</span></div>`).join('')}</div>`}const monthE=state.events.filter(e=>e.date.getFullYear()===y&&e.date.getMonth()===m);const notices=currentNotices();return header(`${y}년 ${m+1}월`)+(notices.length?`<div class="card notice"><b>공지사항</b><div>${notices.map(x=>esc(x.text).replace(/\n/g,'<br>')).join('<hr>')}</div></div>`:'')+`<div class="summary"><div class="card"><span class="muted">월간 일정</span><b>${monthE.length}</b></div><div class="card"><span class="muted">일정 부서</span><b>${new Set(monthE.map(x=>x.dept)).size}</b></div><div class="card"><span class="muted">학생 일정</span><b>${state.studentEvents.filter(e=>e.date.getFullYear()===y&&e.date.getMonth()===m).length}</b></div><div class="card"><span class="muted">검색 결과</span><b>${monthE.filter(e=>match(e.dept,e.text)).length}</b></div></div><div class="calendarbox"><div class="calendar">${['일','월','화','수','목','금','토'].map(x=>`<div class="dow">${x}</div>`).join('')}${cells}</div></div>`}
function renderPlan(student=false){const y=state.view.getFullYear(),m=state.view.getMonth(),last=new Date(y,m+1,0).getDate(),source=student?state.studentEvents:state.events;let rows='';for(let d=1;d<=last;d++){const dt=new Date(y,m,d),dk=key(dt),list=source.filter(e=>e.dateKey===dk&&match(student?'':e.dept,student?e.text:e.text));rows+=`<tr class="${dt.getDay()===0?'sun':dt.getDay()===6?'sat':''}"><td><b>${d}</b></td><td>${['일','월','화','수','목','금','토'][dt.getDay()]}</td><td>${list.map(e=>student?`<div class="event">${esc(e.text)}</div>`:`<div class="event" data-detail="event" data-key="${dk}" data-dept="${esc(e.dept)}" data-text="${esc(e.text)}"><span class="tag" style="background:${color(e.dept)}">${esc(e.dept)}</span><span>${esc(e.text)}</span></div>`).join('')}</td>${student?'':`<td>${esc(state.super[dk]||'')}</td><td>${state.prayer[dk]?`${esc(state.prayer[dk].name)}<br><span class="muted">${esc(state.prayer[dk].hymn)} ${esc(state.prayer[dk].bible)}</span>`:''}</td>`}</tr>`}return header(`${y}년 ${m+1}월 ${student?'학생일정':'월중 계획표'}`)+`<div class="card tablewrap"><table class="table"><thead><tr><th>일</th><th>요일</th><th>${student?'학생 일정':'학사 일정'}</th>${student?'':'<th>자습감독</th><th>기도·말씀</th>'}</tr></thead><tbody>${rows}</tbody></table></div>`}
function renderDept(){let selected=window._dept||DEPTS[0];let list=state.events.filter(e=>e.dept===selected&&match(e.dept,e.text));return `<div class="hero"><div><h2>부서별 일정</h2><div class="muted">부서를 선택하면 전체 기간의 일정을 모아봅니다.</div></div></div><div class="filters"><select id="deptSelect">${DEPTS.map(d=>`<option ${d===selected?'selected':''}>${d}</option>`).join('')}</select></div>${list.length?`<div class="deptgrid">${list.map(e=>`<div class="card deptcard" style="border-left-color:${color(e.dept)}"><h3>${e.date.getFullYear()}년 ${e.date.getMonth()+1}월 ${e.date.getDate()}일</h3><div>${esc(e.text)}</div></div>`).join('')}</div>`:'<div class="card empty">해당 부서의 일정이 없습니다.</div>'}`}
function gradeOn(v){return ['1','o','○','◯','v','✓','✔','true','y'].includes(String(v).trim().toLowerCase())}
function renderNuga(){const grade=+(window._grade||1),cat=window._cat||'전체';const base=state.nuga.filter(r=>gradeOn(r.grades[grade-1]));const cats=['전체',...new Set(base.map(r=>r.cat))];const list=base.filter(r=>(cat==='전체'||r.cat===cat)&&match(r.cat,r.content,r.remark));let total=0;return `<div class="hero"><div><h2>창체 누가기록</h2><div class="muted">시트 구조는 그대로 유지하며 학년·영역별로 집계합니다.</div></div></div><div class="filters"><select id="gradeSelect">${[1,2,3].map(g=>`<option value="${g}" ${g===grade?'selected':''}>${g}학년</option>`).join('')}</select><select id="catSelect">${cats.map(c=>`<option ${c===cat?'selected':''}>${esc(c)}</option>`).join('')}</select></div><div class="card tablewrap"><table class="table"><thead><tr><th>No</th><th>영역</th><th>일자</th><th>교시</th><th>시간</th><th>활동내용</th><th>비고</th></tr></thead><tbody>${list.map((r,i)=>{total+=r.hours;return`<tr><td>${i+1}</td><td>${esc(r.cat)}</td><td>${r.date.getMonth()+1}/${r.date.getDate()}</td><td>${esc(r.period)}</td><td>${r.hours}</td><td>${esc(r.content)}</td><td>${esc(r.remark)}</td></tr>`}).join('')}<tr><td colspan="4" style="text-align:right"><b>합계</b></td><td><b>${total}</b></td><td colspan="2"></td></tr></tbody></table></div>`}
function renderRequest(){return `<div class="card request"><h2>학사일정 수정·추가 요청</h2><p class="muted">기존 Google Apps Script 주소를 그대로 사용합니다. 전송 방식도 기존과 동일합니다.</p><div class="form"><label>작성자<input id="reqName" placeholder="성함"></label><label>요청 유형<select id="reqType"><option>일정수정</option><option>프로그램 개선</option><option>기타</option></select></label><label>요청 내용<textarea id="reqContent" placeholder="날짜, 부서, 변경 내용을 구체적으로 입력해 주세요."></textarea></label><button class="btn primary" id="sendRequest">요청 전송</button></div></div>`}
function render(){document.documentElement.style.setProperty('--font',`${14+state.font}px`);const c=$('#content');c.innerHTML=state.tab==='calendar'?renderCalendar():state.tab==='plan'?renderPlan(false):state.tab==='student'?renderPlan(true):state.tab==='dept'?renderDept():state.tab==='nuga'?renderNuga():renderRequest();bindContent()}
function bindContent(){document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{state.view.setMonth(state.view.getMonth()+(+b.dataset.month));render()});if($('#todayBtn'))$('#todayBtn').onclick=()=>{const n=new Date();state.view=new Date(n.getFullYear(),n.getMonth(),1);render()};if($('#deptSelect'))$('#deptSelect').onchange=e=>{window._dept=e.target.value;render()};if($('#gradeSelect'))$('#gradeSelect').onchange=e=>{window._grade=e.target.value;window._cat='전체';render()};if($('#catSelect'))$('#catSelect').onchange=e=>{window._cat=e.target.value;render()};document.querySelectorAll('[data-detail="event"]').forEach(el=>el.onclick=()=>openEvent(el));if($('#sendRequest'))$('#sendRequest').onclick=sendRequest}
function openEvent(el){const dk=el.dataset.key,dept=el.dataset.dept,text=el.dataset.text,p=state.prayer[dk],same=state.events.filter(e=>e.dateKey===dk);$('#modalTitle').textContent=`${dk} · ${dept}`;$('#modalBody').textContent=[text,state.super[dk]?`\n자습감독: ${state.super[dk]}`:'',p?`\n기도/말씀: ${p.name} · ${p.hymn} · ${p.bible}`:'',same.length>1?'\n같은 날 다른 일정\n'+same.map(x=>`• [${x.dept}] ${x.text}`).join('\n'):''].join('');$('#modal').classList.add('show')}
async function sendRequest(){const name=$('#reqName').value.trim(),type=$('#reqType').value,content=$('#reqContent').value.trim(),btn=$('#sendRequest');if(!name||!content)return alert('작성자와 요청 내용을 입력해 주세요.');btn.disabled=true;btn.textContent='전송 중…';try{await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,type,content})});alert('요청을 전송했습니다. 관리자 시트 반영 여부를 확인해 주세요.');state.tab='calendar';syncTabs();render()}catch(e){alert('전송 중 오류가 발생했습니다.')}finally{btn.disabled=false;btn.textContent='요청 전송'}}
function syncTabs(){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===state.tab))}
$('#nav').onclick=e=>{const b=e.target.closest('.tab');if(!b)return;state.tab=b.dataset.tab;syncTabs();render()};$('#search').oninput=e=>{state.query=e.target.value;render()};$('#clearSearch').onclick=()=>{$('#search').value='';state.query='';render()};$('#refreshBtn').onclick=loadAll;$('#fontBtn').onclick=()=>{state.font=state.font>=3?-1:state.font+1;render()};$('#themeBtn').onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem('calendar-theme',document.body.classList.contains('dark')?'dark':'light')};$('#hideBanner').onclick=hideBanner;$('#modalClose').onclick=()=>$('#modal').classList.remove('show');$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')};if(localStorage.getItem('calendar-theme')==='dark'||(!localStorage.getItem('calendar-theme')&&matchMedia('(prefers-color-scheme:dark)').matches))document.body.classList.add('dark');addEventListener('keydown',e=>{if(e.key==='Escape')$('#modal').classList.remove('show');if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();$('#search').focus()}});loadAll();
</script>
</body>
