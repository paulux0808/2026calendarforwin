<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 스마트 학사관리 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border-heavy: #868e96;
            --text-main: #1a1d23;
            --text-muted: #495057;
            --accent: #339af0;
            --sat-bg: #e7f5ff;
            --sun-bg: #fff5f5;
        }

        /* 기본 레이아웃 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header-wrapper { background: #fff; z-index: 1000; border-bottom: 2px solid var(--border-heavy); padding: 8px 20px; flex-shrink: 0; }
        .header { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        .container { flex-grow: 1; overflow-y: auto; display: block; width: 100%; padding: 15px 0; }
        .limit-wrapper { max-width: 1400px; margin: 0 auto; width: 95%; }

        .controls { display: flex; gap: 4px; background: #e9ecef; padding: 3px; border-radius: 10px; border: 2px solid var(--border-heavy); }
        .btn { background: transparent; color: var(--text-muted); border: none; padding: 5px 12px; border-radius: 6px; font-weight: 800; font-size: 13.5px; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .btn:hover { background: #dee2e6; color: var(--text-main); }
        .btn.active { background: var(--border-heavy); color: #fff; }

        #btn_request { color: #c92a2a; }
        #btn_request:hover { background: #ffc9c9; color: #c92a2a; }
        #btn_request.active { background: #c92a2a; color: #fff; }

        /* 월 선택기 */
        .month-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .month-title { font-size: 20px; font-weight: 900; color: #212529; min-width: 130px; text-align: center; }

        /* 달력 그리드 */
        .calendar-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px; grid-auto-rows: minmax(140px, auto); }
        .cal-head { padding: 8px; text-align: center; font-weight: 900; background: #f1f3f5; border: 2px solid var(--border-heavy); border-radius: 5px; }
        .cal-cell { background: #fff; border: 2px solid var(--border-heavy); border-radius: 8px; padding: 6px; display: flex; flex-direction: column; min-width: 0; }
        .cal-cell.today { background: #fff9db; border-color: #fcc419; border-width: 3px; }
        .cal-cell.other-month { opacity: 0.3; background: #f8f9fa; }
        .cal-date { font-size: 14px; font-weight: 900; margin-bottom: 6px; }
        
        /* 달력 내 일정 (들여쓰기 핵심 코드) */
        .cal-ev { 
            display: grid;
            grid-template-columns: auto 1fr; /* 태그는 내용만큼, 텍스트는 나머지 전체 */
            align-items: start;
            gap: 4px;
            font-size: 11px; 
            margin-bottom: 5px; 
            font-weight: 600; 
            cursor: pointer; 
            line-height: 1.4; 
            color: #1a1d23;
            text-align: left;
            word-break: keep-all; 
            overflow-wrap: break-word;
        }
        .cal-ev:hover .cal-text { text-decoration: underline; }

        /* 부서명 태그 (블록) */
        .cal-dept-tag { 
            display: inline-block;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 900;
            font-size: 9.5px;
            color: #000;
            line-height: 1.2;
            border: 1px solid rgba(0,0,0,0.1);
            white-space: nowrap; /* 부서명은 한 줄로 고정 */
        }
        .cal-text {
            padding-top: 1px;
        }

        /* 계획표(표) 스타일 */
        .table-container { border: 2px solid var(--border-heavy); border-radius: 8px; overflow: hidden; }
        .plan-table { width: 100%; border-collapse: collapse; background: #fff; table-layout: fixed; }
        .plan-table th { position: sticky; top: 0; background: #e9ecef; border-bottom: 2px solid var(--border-heavy); padding: 10px; font-weight: 900; z-index: 10; }
        .plan-table td { border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; padding: 8px; text-align: center; }
        .plan-table tr.row-sun { background: var(--sun-bg); color: #c92a2a; }
        .plan-table tr.row-sat { background: var(--sat-bg); color: #1864ab; }
        
        /* 계획표에서도 들여쓰기 적용 */
        .event-container { display: flex; flex-direction: column; gap: 5px; text-align: left; }
        .event-row { 
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            gap: 6px;
            font-size: 13.5px; 
            font-weight: 700; 
            line-height: 1.4; 
            cursor: pointer; 
        }
        .screen-dept { 
            display: inline-block; 
            padding: 1.5px 6px; 
            border-radius: 4px; 
            font-size: 10.5px; 
            border: 1px solid rgba(0,0,0,0.1); 
            font-weight: 900; 
            white-space: nowrap;
        }
        
        /* 공용 컴포넌트 */
        .prayer-box { line-height: 1.2; font-size: 13px; }
        .prayer-name { font-weight: 900; display: block; margin-bottom: 2px; font-size: 14px; }
        .dept-month-title { font-size: 18px; font-weight: 900; border-bottom: 4px solid var(--border-heavy); margin: 20px 0 10px; padding-bottom: 5px; }
        .dept-card { background: #fff; border: 2px solid var(--border-heavy); border-radius: 12px; padding: 15px; margin-bottom: 10px; }

        /* 요청사항 폼 */
        .request-form { background: #fff; border: 3px solid var(--border-heavy); border-radius: 16px; padding: 40px; max-width: 600px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-label { display: block; font-weight: 900; margin-bottom: 8px; font-size: 16px; }
        .form-input, .form-textarea { width: 100%; padding: 14px; border: 2px solid #dee2e6; border-radius: 8px; font-family: inherit; font-size: 15px; background: #f8f9fa; }
        .form-textarea { height: 160px; resize: none; }
        .submit-btn { width: 100%; background: var(--border-heavy); color: #fff; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: 900; cursor: pointer; }

        /* 공지사항 팝업 및 로딩 */
        #noticeModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(2px); }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 5px solid #e9ecef; border-top-color: var(--border-heavy); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media print {
            body { overflow: visible; height: auto; }
            .header-wrapper, .month-selector, .no-print { display: none !important; }
            .container { overflow: visible; padding: 0; }
            .limit-wrapper { max-width: 100%; width: 100%; margin: 0; }
            .plan-table td { border: 1px solid #000 !important; }
            .plan-table th { border: 1px solid #000 !important; background: #eee !important; position: static; }
            .print-title { display: block !important; text-align: center; font-size: 22px; font-weight: 900; margin-bottom: 15px; }
            @page { size: A4 landscape; margin: 10mm; }
        }
        .print-title { display: none; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-weight:900; margin-top:15px;">학사 데이터 동기화 중...</div>
</div>

<div id="noticeModal" class="no-print">
    <div style="background:#fff; width:95%; max-width:600px; border-radius:16px; border:3px solid var(--border-heavy); overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.3);">
        <div style="background:#f8f9fa; padding:18px; border-bottom:2px solid var(--border-heavy); font-weight:900; font-size:22px; color:#000;" id="modalTitle">📢 공지사항</div>
        <div style="padding:25px; font-size:19px; line-height:1.8; white-space:pre-wrap; max-height:65vh; overflow-y:auto; color:#000; font-weight:700;" id="modalContent"></div>
        <div style="padding:15px; background:#f1f3f5; display:flex; justify-content:center;">
            <button class="btn" onclick="closeNotice()" style="background:var(--border-heavy); color:#fff; padding:12px 70px; border-radius:8px; font-weight:900;">확인</button>
        </div>
    </div>
</div>

<div class="header-wrapper no-print">
    <div class="header">
        <h1 onclick="location.reload()" style="font-size:18px; font-weight:900; cursor:pointer;">📅 스마트 학사관리 시스템</h1>
        <div class="controls">
            <button class="btn active" id="btn_calendar" onclick="switchTab('calendar')">🗓️ 달력 일정</button>
            <button class="btn" id="btn_plan" onclick="switchTab('plan')">📋 월중 계획표</button>
            <button class="btn" id="btn_dept" onclick="switchTab('dept')">🏢 부서별 조회</button>
            <button class="btn" id="btn_request" onclick="switchTab('request')">✍️ 수정/추가 요청</button>
        </div>
    </div>
</div>

<div class="container" id="mainContainer"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz7y4g3X-UxdwBR97fdS0N667G4Y4Mia4p0IBIJlBvU8ZkG7NaVD_HITsxANGt_aue-LA/exec";
    const SHEET_ID = '10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg';
    const FIXED_DEPTS = ["교목부", "교무부", "연구부", "상담부", "정보부", "1학년부", "2학년부", "3학년부", "기획위원", "행정실", "국어과", "영어과", "수학과", "사회과", "과학과", "예체능과", "정보과", "외국어과", "기타"];
    
    let scheduleData = [], supervisorMap = {}, prayerMap = {}, deptColors = {}, dataLoaded = 0;

    const PASTELS = [
        '#ffadad', '#ffdada', // 빨강 (교목, 교무)
        '#ffd6a5', '#ffecd2', // 주황 (연구, 상담)
        '#fdffb6', '#fdfdf0', // 노랑 (정보, 1학년)
        '#caffbf', '#e9ffeb', // 초록 (2학년, 3학년)
        '#9bf6ff', '#e0ffff', // 청록 (기획, 행정)
        '#a0c4ff', '#e2edff', // 파랑 (국어, 영어)
        '#bdb2ff', '#ece8ff', // 보라 (수학, 사회)
        '#ffc6ff', '#ffebff', // 자주 (과학, 예체능)
        '#ffb7e5', '#ffe4f3', // 분홍 (정보과, 외국어)
        '#e9ecef'            // 기타 (회색)
    ];

    FIXED_DEPTS.forEach((d, i) => { deptColors[d] = PASTELS[i] || '#f1f3f5'; });

    function parseGDate(v) {
        if (!v || typeof v !== 'string' || !v.includes('Date')) return null;
        const parts = v.match(/\d+/g);
        return new Date(parts[0], parts[1], parts[2]);
    }

    function checkReady() {
        dataLoaded++;
        if (dataLoaded >= 4) {
            document.getElementById('loadingOverlay').style.display = 'none';
            switchTab('calendar');
        }
    }

    window.cb_schedule = function(data) {
        data.table.rows.forEach(r => {
            if (!r.c || !r.c[0]) return;
            const date = parseGDate(r.c[0].v);
            const content = r.c[2] ? String(r.c[2].v).trim() : "";
            if (date && content && content !== "null") {
                const dayEvents = content.split('\n').filter(l => l.trim() && l !== "null").map(line => {
                    const deptMatch = line.match(/^\[([^\]]+)\]/);
                    let deptName = deptMatch ? deptMatch[1].trim() : '기타';
                    let text = deptMatch ? line.replace(deptMatch[0], '').trim() : line.trim();
                    if (!FIXED_DEPTS.includes(deptName)) { deptName = '기타'; text = line; }
                    return { dept: deptName, text: text };
                });
                scheduleData.push({ date, events: dayEvents });
            }
        });
        checkReady();
    };

    window.cb_super = function(data) {
        data.table.rows.forEach(r => {
            if (!r.c || !r.c[0]) return;
            const date = parseGDate(r.c[0].v);
            const name = r.c[2] ? String(r.c[2].v).trim() : "";
            if (date && name && name !== "null") supervisorMap[date.toISOString().split('T')[0]] = name;
        });
        checkReady();
    };

    window.cb_prayer = function(data) {
        data.table.rows.forEach((r, i) => {
            if (i < 1 || !r.c || !r.c[0]) return;
            const dateObj = parseGDate(r.c[0].v);
            if (!dateObj) return;
            const dateKey = dateObj.toISOString().split('T')[0];
            const name = r.c[2] ? String(r.c[2].v).trim() : ""; 
            const bible = r.c[3] ? String(r.c[3].v).trim() : ""; 
            const hymn = r.c[4] ? String(r.c[4].v).trim() : ""; 
            if (name && name !== "null") prayerMap[dateKey] = { name, hymn, bible };
        });
        checkReady();
    };

    window.cb_notice = function(data) {
        if (data.table.rows && data.table.rows.length > 0) {
            let combinedHTML = "";
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            data.table.rows.forEach((r) => {
                if (!r || !r.c || r.c.length < 3) return;
                const startDate = parseGDate(r.c[0] ? r.c[0].v : null);
                const endDate = parseGDate(r.c[1] ? r.c[1].v : null);
                const content = r.c[2] ? String(r.c[2].v).trim() : "";
                if (content && content !== "null" && content !== "") {
                    let isVisible = false;
                    if (startDate && endDate) {
                        startDate.setHours(0,0,0,0); endDate.setHours(0,0,0,0);
                        if (today >= startDate && today <= endDate) isVisible = true;
                    } else { isVisible = true; }
                    if (isVisible) {
                        if (combinedHTML !== "") combinedHTML += '<hr style="border:0; height:1px; background:#dee2e6; margin:20px 0;">';
                        combinedHTML += content;
                    }
                }
            });
            if (combinedHTML.trim() !== "") {
                document.getElementById('modalTitle').innerText = "📢 공지사항";
                document.getElementById('modalContent').innerHTML = combinedHTML;
                document.getElementById('noticeModal').style.display = 'flex';
            }
        }
        checkReady();
    };

    function fetchAll() {
        const sheets =[{gid:'0',cb:'cb_schedule'}, {gid:'1459415616',cb:'cb_super'}, {gid:'1697887995',cb:'cb_prayer'}, {gid:'1487091944',cb:'cb_notice'}];
        sheets.forEach(s => {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${s.cb}&gid=${s.gid}&_=${Date.now()}`;
            document.body.appendChild(script);
        });
    }
    fetchAll();

    let currentTab = 'calendar', viewDate = new Date();
    function switchTab(id) {
        currentTab = id;
        document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + id).classList.add('active');
        render();
    }

    function render() {
        const mc = document.getElementById('mainContainer'); mc.innerHTML = '';
        if(currentTab === 'calendar') renderCalendar(mc);
        else if(currentTab === 'plan') renderPlan(mc);
        else if(currentTab === 'dept') renderDept(mc);
        else if(currentTab === 'request') renderRequestForm(mc);
    }

    window.changeMonth = (v) => { viewDate.setMonth(viewDate.getMonth() + v); render(); };
    window.goDept = (deptName) => { window._selDept = deptName; switchTab('dept'); };
    window.closeNotice = () => { document.getElementById('noticeModal').style.display = 'none'; };

    // --- 달력 렌더링 (들여쓰기 구조 적용) ---
    function renderCalendar(c) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth(), now = new Date();
        let html = `<div class="limit-wrapper">
            <div class="month-selector no-print"><button class="btn" onclick="changeMonth(-1)">◀ 이전</button><div class="month-title">${y}년 ${m + 1}월</div><button class="btn" onclick="changeMonth(1)">다음 ▶</button></div>
            <div class="calendar-grid">${['월','화','수','목','금'].map(d => `<div class="cal-head">${d}</div>`).join('')}`;
        
        const firstDay = new Date(y, m, 1), lastDay = new Date(y, m + 1, 0);
        let curr = new Date(firstDay);
        let diff = curr.getDay() - 1; if(diff === -1) diff = 6;
        curr.setDate(curr.getDate() - diff);

        for(let i=0; i<35; i++) {
            const dStr = curr.toISOString().split('T')[0];
            const isToday = curr.toDateString() === now.toDateString();
            if(curr.getDay() !== 0 && curr.getDay() !== 6) {
                const dayData = scheduleData.find(x => x.date.toISOString().split('T')[0] === dStr);
                html += `<div class="cal-cell ${curr.getMonth()!==m?'other-month':''} ${isToday?'today':''}">
                    <div class="cal-date">${curr.getDate()}</div>
                    ${dayData ? dayData.events.map(e => `
                        <div class="cal-ev" onclick="goDept('${e.dept}')" title="[${e.dept}] ${e.text}">
                            <div class="cal-dept-tag" style="background:${deptColors[e.dept]}">${e.dept}</div>
                            <div class="cal-text">${e.text}</div>
                        </div>`).join('') : ''}
                </div>`;
            }
            curr.setDate(curr.getDate() + 1);
            if(curr > lastDay && curr.getDay() === 1) break;
        }
        c.innerHTML = html + `</div></div>`;
    }

    // --- 계획표 렌더링 (들여쓰기 구조 적용) ---
    function renderPlan(c) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const lastDay = new Date(y, m + 1, 0).getDate();
        let html = `<div class="limit-wrapper">
            <div class="month-selector no-print"><button class="btn" onclick="changeMonth(-1)">◀ 이전</button><div class="month-title">${y}년 ${m + 1}월</div><button class="btn" onclick="changeMonth(1)">다음 ▶</button><button class="btn active" style="margin-left:20px; background:var(--border-heavy);" onclick="window.print()">🖨️ 인쇄</button></div>
            <div class="print-title">${y}학년도 ${m + 1}월중 학사운영 계획</div>
            <div class="table-container"><table class="plan-table"><thead><tr><th style="width:50px">날짜</th><th style="width:40px">요일</th><th>주요 행사 내용</th><th style="width:130px">기도/말씀</th><th style="width:100px">자습감독</th></tr></thead><tbody>`;
        
        for(let d=1; d<=lastDay; d++) {
            const date = new Date(y, m, d), dISO = date.toISOString().split('T')[0];
            const dayData = scheduleData.find(x => x.date.toISOString().split('T')[0] === dISO);
            const prayer = prayerMap[dISO] || {name:"", hymn:"", bible:""};
            const rowClass = date.getDay()===0 ? 'row-sun' : date.getDay()===6 ? 'row-sat' : '';
            
            html += `<tr class="${rowClass}">
                <td style="font-weight:900;">${d}</td>
                <td>${['일','월','화','수','목','금','토'][date.getDay()]}</td>
                <td><div class="event-container">${dayData ? dayData.events.map(e => `
                    <div class="event-row" onclick="goDept('${e.dept}')">
                        <div class="screen-dept" style="background:${deptColors[e.dept]}">${e.dept}</div>
                        <div>${e.text}</div>
                    </div>`).join('') : ''}</div></td>
                <td><div class="prayer-box"><span class="prayer-name">${prayer.name}</span><span>${prayer.hymn}</span><br><span>${prayer.bible}</span></div></td>
                <td style="font-weight:800;">${supervisorMap[dISO] || ""}</td>
            </tr>`;
        }
        c.innerHTML = html + `</tbody></table></div></div>`;
    }

    // --- 부서별 조회 ---
    function renderDept(c) {
        if(!window._selDept) window._selDept = FIXED_DEPTS[0];
        const filtered = scheduleData.filter(day => day.events.some(e => e.dept === window._selDept)).sort((a,b) => a.date - b.date);
        const monthGroups = {}, orderedMonthKeys =[];
        filtered.forEach(item => {
            const mKey = `${item.date.getFullYear()}년 ${item.date.getMonth()+1}월`;
            if(!monthGroups[mKey]) { monthGroups[mKey] =[]; orderedMonthKeys.push(mKey); }
            monthGroups[mKey].push(item);
        });

        let html = `<div class="limit-wrapper"><div class="month-selector no-print" style="justify-content:flex-start;"><label style="font-weight:900; margin-right:15px;">🏢 부서 선택:</label>
            <select class="btn" style="border:2px solid var(--border-heavy); background:#fff;" onchange="window._selDept=this.value; render();">${FIXED_DEPTS.map(d => `<option value="${d}" ${window._selDept===d?'selected':''}>${d}</option>`).join('')}</select></div>`;
        
        if(!orderedMonthKeys.length) html += `<div style="text-align:center; padding:80px; color:#868e96; font-weight:800; border:2px dashed var(--border-heavy); border-radius:15px; margin-top:20px;">일정이 없습니다.</div>`;
        else {
            orderedMonthKeys.forEach(mKey => {
                html += `<div class="dept-month-title">${mKey}</div><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:12px;">`;
                monthGroups[mKey].forEach(item => {
                    const events = item.events.filter(e => e.dept === window._selDept);
                    html += `<div class="dept-card" style="border-left: 8px solid ${deptColors[window._selDept]}">
                        <div style="font-weight:900; margin-bottom:8px;">${item.date.getMonth()+1}월 ${item.date.getDate()}일 (${['일','월','화','수','목','금','토'][item.date.getDay()]})</div>
                        ${events.map(e => `<div style="font-weight:800; color:#212529;">• ${e.text}</div>`).join('')}
                    </div>`;
                });
                html += `</div>`;
            });
        }
        c.innerHTML = html + `</div>`;
    }

    // --- 수정 요청 폼 ---
    function renderRequestForm(c) {
        c.innerHTML = `
            <div class="limit-wrapper">
                <div class="request-form">
                    <h2 style="margin-bottom:10px; text-align:center;">✍️ 학사일정 수정/추가 요청</h2>
                    <p style="margin-bottom:30px; color:var(--text-muted); font-size:14px; text-align:center; line-height:1.5;">내용을 작성하시면 구글 시트로 전송되며,<br>관리자 확인 후 실제 학사일정에 반영됩니다.</p>
                    <div class="form-group"><label class="form-label">작성자 성함</label><input type="text" id="reqName" class="form-input" placeholder="성함을 입력해 주세요"></div>
                    <div class="form-group"><label class="form-label">요청 유형</label><select id="reqType" class="form-input"><option value="일정수정">일정수정/추가</option><option value="프로그램 개선">시스템 개선</option><option value="기타">기타</option></select></div>
                    <div class="form-group"><label class="form-label">요청 내용</label><textarea id="reqContent" class="form-textarea" placeholder="상세 내용을 적어주세요."></textarea></div>
                    <button class="submit-btn" id="submitBtn" onclick="submitRequest()">보내기</button>
                </div>
            </div>
        `;
    }

    async function submitRequest() {
        const name = document.getElementById('reqName').value;
        const type = document.getElementById('reqType').value;
        const content = document.getElementById('reqContent').value;
        const btn = document.getElementById('submitBtn');
        if(!name || !content) { alert("성함과 요청 내용을 모두 입력해 주세요."); return; }
        btn.disabled = true; btn.innerText = "전송 중...";
        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, type, content })
            });
            alert("요청이 성공적으로 전송되었습니다!");
            switchTab('calendar');
        } catch (error) {
            alert("전송 중 오류가 발생했습니다.");
        } finally {
            btn.disabled = false; btn.innerText = "보내기";
        }
    }
</script>
</body>
</html>
