        return `<button class="search-result" type="button" data-search-date="${item.dateKey}"><span class="search-result-date">${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,"0")}.${String(date.getDate()).padStart(2,"0")}</span><span class="search-result-main"><span class="search-result-type">${escapeHTML(item.kind)} · ${escapeHTML(item.dept)}</span><span class="search-result-text">${highlightHTML(item.text)}</span></span><span class="search-result-arrow">›</span></button>`;
      }).join("");
      el.root.innerHTML = `<div class="toolbar"><div class="toolbar-left"><div><div class="panel-title">“${escapeHTML(state.query)}” 검색 결과</div><div class="panel-desc">전체 일정, 학생 일정, 누가기록을 날짜순으로 함께 찾았습니다.</div></div></div><div class="toolbar-right"><button class="chip-btn" type="button" data-action="clear-search">검색 닫기</button></div></div><div class="search-results"><section class="panel"><div class="panel-head"><div><div class="panel-title">${results.length}건 발견</div><div class="panel-desc">결과를 누르면 해당 날짜의 달력과 우측 상세 패널로 이동합니다.</div></div></div><div class="search-result-list">${list || emptyState("검색 결과가 없습니다.", "다른 단어나 부서명으로 검색해 보세요.", "⌕")}</div></section><aside class="search-help"><div class="search-help-title">빠른 검색 사용법</div><p>여러 단어를 띄어 쓰면 모든 단어가 포함된 결과만 찾습니다. 결과 선택 시 해당 월과 날짜를 바로 엽니다.</p><p>검색을 종료하려면 Esc 또는 ‘검색 닫기’를 누르세요.</p></aside></div>`;
    }

    function eventButton(id) {
      const event = index.eventsById[id];
      if (!event) return "";
      return `<button class="event-item" type="button" data-event-id="${id}">
        <span class="dept-tag" style="background:${deptColors[event.dept] || deptColors["기타"]}">${escapeHTML(event.dept)}</span>
        <span class="event-text">${highlightHTML(event.text)}</span>
      </button>`;
    }

    function renderPlan() {
      const controls = `
        <button class="chip-btn ${state.planShowDept ? "active" : ""}" type="button" data-action="plan-dept">부서</button>
        <button class="chip-btn ${state.planShowPrayer ? "active" : ""}" type="button" data-action="plan-prayer">기도·말씀</button>
        <button class="chip-btn ${state.planShowSuper ? "active" : ""}" type="button" data-action="plan-super">자습감독</button>
        <button class="chip-btn ${state.planHorizontal ? "active" : ""}" type="button" data-action="plan-horizontal">가로 배치</button>
        <button class="chip-btn ${state.showWeekends ? "active" : ""}" type="button" data-action="toggle-weekends">주말</button>
        <button class="chip-btn no-print" type="button" data-action="print">인쇄</button>`;

      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth();
      const lastDay = new Date(y, m + 1, 0).getDate();
      const rows = [];
      const cards = [];

      for (let d = 1; d <= lastDay; d += 1) {
        const date = new Date(y, m, d);
        if (!state.showWeekends && [0,6].includes(date.getDay())) continue;

        const key = localDateKey(date);
        const ids = (index.daysByKey[key]?.eventIds || []).filter(id => {
          const event = index.eventsById[id];
          return matchesTokens(event.dept, event.text);
        });
        const prayer = data.prayer[key] || {};
        const supervisor = data.supervisor[key] || "";
        const today = key === localDateKey(new Date());
        const rowClass = date.getDay() === 0 ? "sun-row" : date.getDay() === 6 ? "sat-row" : "";
        const eventHTML = ids.length
          ? ids.map(id => tableEvent(id, state.planShowDept)).join("")
          : `<span class="no-event">${state.tokens.length ? "검색 결과 없음" : ""}</span>`;

        rows.push(`<tr class="${rowClass} ${today ? "today-row" : ""}">
          <td style="width:46px;font-weight:950;">${d}</td>
          <td style="width:46px;font-weight:900;">${weekdayName(date.getDay())}</td>
          <td>
            <div class="table-events ${state.planHorizontal ? "horizontal" : ""}">${eventHTML}</div>
          </td>
          ${state.planShowPrayer ? `<td style="width:180px;"><div class="meta-stack">
            <div><span class="meta-label">담당</span> <span class="meta-value">${escapeHTML(prayer.name || "-")}</span></div>
            <div><span class="meta-label">찬송</span> <span class="meta-value">${escapeHTML(prayer.hymn || "-")}</span></div>
            <div><span class="meta-label">말씀</span> <span class="meta-value">${escapeHTML(prayer.bible || "-")}</span></div>
          </div></td>` : ""}
          ${state.planShowSuper ? `<td style="width:120px;"><span class="meta-value">${escapeHTML(supervisor || "-")}</span></td>` : ""}
        </tr>`);

        cards.push(`<article class="mobile-card ${today ? "today-card" : ""}">
          <div class="mobile-card-date">${m + 1}월 ${d}일 (${weekdayName(date.getDay())})</div>
          <div class="table-events ${state.planHorizontal ? "horizontal" : ""}">${eventHTML || `<div class="no-event">일정 없음</div>`}</div>
          ${(state.planShowPrayer || state.planShowSuper) ? `<div class="mobile-card-meta">
            ${state.planShowPrayer ? `<div class="meta-box">
              <div class="meta-label">기도·말씀</div>
              <div class="meta-value">${escapeHTML(prayer.name || "-")} · ${escapeHTML(prayer.hymn || "-")} · ${escapeHTML(prayer.bible || "-")}</div>
            </div>` : ""}
            ${state.planShowSuper ? `<div class="meta-box">
              <div class="meta-label">자습감독</div>
              <div class="meta-value">${escapeHTML(supervisor || "-")}</div>
            </div>` : ""}
          </div>` : ""}
        </article>`);
      }

      el.root.innerHTML = `
        ${monthToolbar(controls)}
        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">${tabTitle()}</div>
              <div class="panel-desc">표시 항목을 조절한 뒤 인쇄할 수 있습니다.</div>
            </div>
          </div>
          <div class="desktop-table table-scroll">
            <table class="data-table">
              <thead><tr>
                <th style="width:46px;">날짜</th>
                <th style="width:46px;">요일</th>
                <th>학사 일정</th>
                ${state.planShowPrayer ? `<th style="width:180px;">기도·말씀</th>` : ""}
                ${state.planShowSuper ? `<th style="width:120px;">자습감독</th>` : ""}
              </tr></thead>
              <tbody>${rows.join("")}</tbody>
            </table>
          </div>
          <div class="mobile-cards">${cards.join("")}</div>
        </section>`;
    }

    function tableEvent(id, showDept = true) {
      const event = index.eventsById[id];
      if (!event) return "";
      return `<button class="table-event" type="button" data-event-id="${id}">
        ${showDept ? `<span class="dept-tag" style="background:${deptColors[event.dept] || deptColors["기타"]}">${escapeHTML(event.dept)}</span>` : ""}
        <span class="event-text">${highlightHTML(event.text)}</span>
      </button>`;
    }

    function renderStudent() {
      const controls = `
        <button class="chip-btn ${state.studentShowWeekends ? "active" : ""}" type="button" data-action="student-weekends">주말</button>
        <button class="chip-btn ${state.studentHorizontal ? "active" : ""}" type="button" data-action="student-horizontal">가로 배치</button>
        <button class="chip-btn no-print" type="button" data-action="print">인쇄</button>`;

      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth();
      const lastDay = new Date(y, m + 1, 0).getDate();
      const rows = [];
      const cards = [];

      for (let d = 1; d <= lastDay; d += 1) {
        const date = new Date(y, m, d);
        if (!state.studentShowWeekends && [0,6].includes(date.getDay())) continue;
        const key = localDateKey(date);
        const ids = (index.studentDaysByKey[key]?.eventIds || []).filter(id => {
          const event = index.studentEventsById[id];
          return matchesTokens(event.text);
        });
        const eventHTML = ids.length
          ? ids.map(studentEventButton).join("")
          : `<div class="no-event">${state.tokens.length ? "검색 결과 없음" : ""}</div>`;
        const rowClass = date.getDay() === 0 ? "sun-row" : date.getDay() === 6 ? "sat-row" : "";
        const today = key === localDateKey(new Date());

        rows.push(`<tr class="${rowClass} ${today ? "today-row" : ""}">
          <td style="width:56px;font-weight:950;">${d}</td>
          <td style="width:56px;font-weight:900;">${weekdayName(date.getDay())}</td>
          <td><div class="table-events ${state.studentHorizontal ? "horizontal" : ""}">${eventHTML}</div></td>
        </tr>`);

        cards.push(`<article class="mobile-card ${today ? "today-card" : ""}">
          <div class="mobile-card-date">${m + 1}월 ${d}일 (${weekdayName(date.getDay())})</div>
          <div class="table-events ${state.studentHorizontal ? "horizontal" : ""}">${eventHTML}</div>
        </article>`);
      }

      el.root.innerHTML = `
        ${monthToolbar(controls)}
        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">${tabTitle()}</div>
              <div class="panel-desc">학생 일정 시트의 표시 형식이 달라도 날짜와 내용을 최대한 복원합니다.</div>
            </div>
          </div>
          <div class="desktop-table table-scroll">
            <table class="data-table">
              <thead><tr><th style="width:56px;">날짜</th><th style="width:56px;">요일</th><th>학생 일정</th></tr></thead>
              <tbody>${rows.join("")}</tbody>
            </table>
          </div>
          <div class="mobile-cards">${cards.join("")}</div>
        </section>`;
    }

    function studentEventButton(id) {
      const event = index.studentEventsById[id];
      if (!event) return "";
      return `<button class="table-event" type="button" data-student-event-id="${id}">
        <span class="event-text">${highlightHTML(event.text)}</span>
      </button>`;
    }

    function renderDept() {
      const available = FIXED_DEPTS.filter(dept => (index.dept[dept] || []).length > 0 || dept === state.selectedDept);
      if (!available.includes(state.selectedDept)) state.selectedDept = available[0] || FIXED_DEPTS[0];

      const sidebar = FIXED_DEPTS.map(dept => {
        const count = (index.dept[dept] || []).filter(id => {
          const event = index.eventsById[id];
          return matchesTokens(event.dept, event.text);
        }).length;
        return `<button class="dept-btn ${state.selectedDept === dept ? "active" : ""}" type="button" data-dept="${escapeHTML(dept)}">
          <span>${escapeHTML(dept)}</span><span class="count-badge">${count}</span>
        </button>`;
      }).join("");

      const ids = (index.dept[state.selectedDept] || []).filter(id => {
        const event = index.eventsById[id];
        return matchesTokens(event.dept, event.text);
      });

      const grouped = new Map();
      ids.forEach(id => {
        const event = index.eventsById[id];
        const date = dateFromKey(event.dateKey);
        const key = `${date.getFullYear()}년 ${date.getMonth() + 1}월`;
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push({ id, event, date });
      });

      const timeline = grouped.size
        ? [...grouped.entries()].map(([month, entries]) => `
            <section class="month-section">
              <div class="month-section-title">${escapeHTML(month)} · ${entries.length}건</div>
              <div class="dept-event-list">
                ${entries.map(({ id, event, date }) => `
                  <article class="dept-event-card">
                    <div class="dept-date">${date.getMonth() + 1}/${date.getDate()} (${weekdayName(date.getDay())})</div>
                    <div class="dept-event-text">${highlightHTML(event.text)}</div>
                    <button class="link-btn" type="button" data-event-id="${id}">상세 보기</button>
                  </article>`).join("")}
              </div>
            </section>`).join("")
        : emptyState("부서 일정 없음", state.tokens.length ? "검색 조건과 일치하는 일정이 없습니다." : "등록된 일정이 없습니다.", "🏢");

      el.root.innerHTML = `
        <div class="toolbar">
          <div class="toolbar-left">
            <div>
              <div style="font-size:20px;font-weight:950;">${tabTitle()}</div>
              <div style="margin-top:3px;color:var(--muted);font-weight:650;">부서를 선택하면 연간 일정을 월별로 모아봅니다.</div>
            </div>
          </div>
          <div class="toolbar-right">
            <button class="chip-btn no-print" type="button" data-action="print">인쇄</button>
          </div>
        </div>
        <div class="dept-layout">
          <aside class="dept-sidebar" aria-label="부서 선택">${sidebar}</aside>
          <div class="timeline">${timeline}</div>
        </div>`;
    }

    function nugaCategories(grade) {
      return grade === 3 ? ["전체", "자율", "봉사", "동아리", "진로"] : ["전체", "자율자치", "동아리", "진로"];
    }

    function nugaCategoryMatch(row, category, grade) {
      return category === "전체" || row.displayCategory[grade] === category;
    }

    function renderNuga() {
      const categories = nugaCategories(state.nugaGrade);
      if (!categories.includes(state.nugaCategory)) state.nugaCategory = "전체";

      const gradeRows = data.nuga.filter(row => row.grades[state.nugaGrade - 1]);
      const totals = Object.fromEntries(categories.map(category => {
        const value = category === "전체"
          ? gradeRows.reduce((sum, row) => sum + row.hours, 0)
          : gradeRows.filter(row => nugaCategoryMatch(row, category, state.nugaGrade)).reduce((sum, row) => sum + row.hours, 0);
        return [category, value];
      }));

      const filtered = gradeRows
        .filter(row => nugaCategoryMatch(row, state.nugaCategory, state.nugaGrade))
        .filter(row => matchesTokens(row.displayCategory[state.nugaGrade], row.content, row.remark, row.periods));

      let running = 0;
      const rows = filtered.map((row, idx) => {
        running += row.hours;
        const category = row.displayCategory[state.nugaGrade];
        return `<tr>
          <td style="width:45px;font-weight:900;">${idx + 1}</td>
          <td style="width:85px;"><span class="dept-tag" style="background:${NUGA_CATEGORY_COLORS[category] || "#e9ecef"}">${escapeHTML(category)}</span></td>
          <td style="width:85px;font-weight:850;">${row.date.getMonth() + 1}/${row.date.getDate()}</td>
          <td style="width:50px;">${escapeHTML(row.dayOfWeek)}</td>
          <td style="width:90px;">${escapeHTML(row.periods || "-")}</td>
          <td style="width:75px;font-weight:900;">${row.hours}</td>
          <td style="text-align:left;font-weight:750;">${highlightHTML(row.content || "-")}</td>
          <td style="text-align:left;color:var(--muted);">${highlightHTML(row.remark || "")}</td>
          <td style="width:75px;font-weight:900;">${running}</td>
        </tr>`;
      }).join("");

      const cards = filtered.map((row, idx) => {
        const category = row.displayCategory[state.nugaGrade];
        const runningTotal = filtered.slice(0, idx + 1).reduce((sum, item) => sum + item.hours, 0);
        return `<article class="mobile-card">
          <div class="mobile-card-date">${row.date.getMonth() + 1}/${row.date.getDate()} (${escapeHTML(row.dayOfWeek)}) · ${escapeHTML(category)}</div>
          <div style="font-weight:800;line-height:1.5;">${highlightHTML(row.content || "-")}</div>
          <div class="mobile-card-meta">
            <div class="meta-box"><div class="meta-label">교시</div><div class="meta-value">${escapeHTML(row.periods || "-")}</div></div>
            <div class="meta-box"><div class="meta-label">이수시간</div><div class="meta-value">${row.hours}시간 · 누계 ${runningTotal}</div></div>
          </div>
          ${row.remark ? `<div style="margin-top:8px;color:var(--muted);font-weight:650;">비고: ${highlightHTML(row.remark)}</div>` : ""}
        </article>`;
      }).join("");

      el.root.innerHTML = `
        <div class="toolbar">
          <div class="toolbar-left">
            <div>
              <div style="font-size:20px;font-weight:950;">${tabTitle()}</div>
              <div style="margin-top:3px;color:var(--muted);font-weight:650;">학년·영역별 이수시간을 누계로 확인합니다.</div>
            </div>
          </div>
          <div class="toolbar-right">
            <button class="chip-btn no-print" type="button" data-action="print">인쇄</button>
          </div>
        </div>

        <div class="filter-card">
          <div class="filter-row">
            <span class="filter-label">학년</span>
            ${[1,2,3].map(grade => `<button class="chip-btn ${state.nugaGrade === grade ? "active" : ""}" type="button" data-nuga-grade="${grade}">${grade}학년</button>`).join("")}
          </div>
          <div class="filter-row" style="margin-top:9px;">
            <span class="filter-label">영역</span>
            ${categories.map(category => `<button class="chip-btn ${state.nugaCategory === category ? "active" : ""}" type="button" data-nuga-category="${escapeHTML(category)}">${escapeHTML(category)}</button>`).join("")}
          </div>
        </div>

        <div class="nuga-summary">
          ${categories.map(category => `
            <button class="nuga-card ${state.nugaCategory === category ? "active" : ""}" type="button" data-nuga-category="${escapeHTML(category)}">
              <div class="nuga-card-label">${escapeHTML(category)}</div>
              <div class="nuga-card-value">${totals[category] || 0}<span style="font-size:12px;color:var(--muted);"> 시간</span></div>
            </button>`).join("")}
        </div>

        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">${state.nugaGrade}학년 · ${escapeHTML(state.nugaCategory)}</div>
              <div class="panel-desc">검색은 활동내용, 비고, 영역, 교시에 함께 적용됩니다.</div>
            </div>
          </div>
          ${filtered.length ? `
            <div class="desktop-table table-scroll">
              <table class="data-table">
                <thead><tr>
                  <th style="width:45px;">No</th><th style="width:85px;">영역</th><th style="width:85px;">일자</th>
                  <th style="width:50px;">요일</th><th style="width:90px;">교시</th><th style="width:75px;">시간</th>
                  <th>활동내용</th><th>비고</th><th style="width:75px;">누계</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
            <div class="mobile-cards">${cards}</div>` : emptyState("누가기록 없음", "선택한 학년·영역·검색 조건에 맞는 기록이 없습니다.", "📝")}
        </section>`;
    }

    function renderRequest() {
      el.root.innerHTML = `
        <div class="toolbar">
          <div class="toolbar-left">
            <div>
              <div style="font-size:20px;font-weight:950;">${tabTitle()}</div>
              <div style="margin-top:3px;color:var(--muted);font-weight:650;">기존 Apps Script 주소로 요청을 전송합니다.</div>
            </div>
          </div>
        </div>

        <div class="request-layout">
          <section class="info-card">
            <h2>일정 변경 요청 안내</h2>
            <p>작성한 내용은 기존 Google Apps Script를 통해 관리 시트로 전달됩니다. 현재 전송 방식은 브라우저가 서버 응답을 읽을 수 없는 구조이므로, 앱에서는 “전송 요청 완료”까지만 확인할 수 있습니다.</p>
            <div class="guide-list">
              <div class="guide-item"><span class="guide-num">1</span><span>변경이 필요한 날짜, 기존 내용, 변경할 내용을 함께 적어 주세요.</span></div>
              <div class="guide-item"><span class="guide-num">2</span><span>부서명과 담당자를 명확히 적으면 확인 시간이 줄어듭니다.</span></div>
              <div class="guide-item"><span class="guide-num">3</span><span>전송 후 실제 일정 반영 여부는 관리자 확인이 필요합니다.</span></div>
            </div>
          </section>

          <section class="form-card">
            <h2>수정·추가 요청서</h2>
            <p>필수 항목을 작성한 뒤 전송해 주세요.</p>
            <form class="form-grid" id="requestForm">
              <div class="field">
                <label for="reqName">작성자 성함</label>
                <input class="form-input" id="reqName" name="name" autocomplete="name" required maxlength="40" placeholder="성함을 입력해 주세요">
              </div>
              <div class="field">
                <label for="reqType">요청 유형</label>
                <select class="form-select" id="reqType" name="type">
                  <option value="일정수정">일정 수정·추가</option>
                  <option value="프로그램 개선">프로그램 개선</option>
                  <option value="기타">기타</option>
                </select>
              </div>
              <div class="field">
                <label for="reqContent">요청 내용</label>
                <textarea class="form-textarea" id="reqContent" name="content" required maxlength="2000"
                  placeholder="예: 9월 15일 교무부 행사명을 ‘○○ 연수’로 변경 요청합니다."></textarea>
                <small><span id="reqCount">0</span>/2000자</small>
              </div>
              <div class="submit-row">
                <button class="action-btn" type="reset">초기화</button>
                <button class="action-btn primary" id="requestSubmit" type="submit">전송 요청</button>
              </div>
            </form>
          </section>
        </div>`;
    }

    function emptyState(title, description, icon = "📭") {
      return `<div class="empty-state">
        <div class="empty-icon">${icon}</div>
        <div class="empty-title">${escapeHTML(title)}</div>
        <div class="empty-desc">${escapeHTML(description)}</div>
      </div>`;
    }

    function changeMonth(delta) {
      state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() + delta, 1);
      state.selectedDateKey = localDateKey(state.viewDate);
      render();
      el.mainScroll.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToday() {
      const today = new Date();
      state.viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
      state.selectedDateKey = localDateKey(today);
      render();
      requestAnimationFrame(() => {
        document.querySelector(".today, .today-row, .today-card")?.scrollIntoView({ block: "center", behavior: "smooth" });
      });
    }

    function switchTab(tab) {
      if (!["calendar","plan","student","dept","nuga","request"].includes(tab)) return;
      state.currentTab = tab;
      render();
      el.mainScroll.scrollTo({ top: 0, behavior: "instant" });
    }

    function openEvent(id) {
      const event = index.eventsById[id];
      if (!event) return;
      state.openEventId = id;
      selectDate(event.dateKey);
    }

    function openStudentEvent(id) {
      const event = index.studentEventsById[id];
      if (!event) return;
      selectDate(event.dateKey);
    }

    function closeModals() {
      document.querySelectorAll(".modal.visible").forEach(modal => modal.classList.remove("visible"));
      document.getElementById("dayDrawer")?.classList.remove("open");
    }

    async function submitRequest(form) {
      const formData = new FormData(form);
      const name = String(formData.get("name") || "").trim();
      const type = String(formData.get("type") || "").trim();
      const content = String(formData.get("content") || "").trim();
      const button = document.getElementById("requestSubmit");

      if (!name || !content) {
        toast("입력 확인", "작성자 성함과 요청 내용을 모두 입력해 주세요.", "error");
        return;
      }

      button.disabled = true;
      button.textContent = "전송 중…";

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, type, content })
        });

        toast("전송 요청 완료", "서버 응답을 확인할 수 없는 방식이므로 실제 반영 여부는 관리자 확인이 필요합니다.", "success");
        form.reset();
        document.getElementById("reqCount").textContent = "0";
      } catch (error) {
        console.error("요청 전송 오류", error);
        toast("전송 실패", "네트워크 상태를 확인한 뒤 다시 시도해 주세요.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "전송 요청";
      }
    }

    function bindRenderedEvents() {
      document.querySelectorAll("[data-date-key]").forEach(node => {
        node.addEventListener("click", event => {
          if (event.target.closest("[data-event-id], [data-action]")) return;
          selectDate(node.dataset.dateKey);
        });
        node.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); selectDate(node.dataset.dateKey); }
        });
      });
      document.querySelectorAll("[data-search-date]").forEach(button => button.addEventListener("click", () => {
        const dateKey = button.dataset.searchDate;
        el.search.value = ""; state.query = ""; state.tokens = []; el.searchClear.classList.remove("visible"); selectDate(dateKey);
      }));
      document.querySelectorAll("[data-drawer-event-id]").forEach(button => button.addEventListener("click", () => {
        const event = index.eventsById[Number(button.dataset.drawerEventId)];
        if (!event) return;
        state.selectedDept = event.dept;
        setPreference("selectedDept", state.selectedDept);
        toast(event.dept, event.text);
      }));
      document.querySelectorAll("[data-event-id]").forEach(button => {
        button.addEventListener("click", () => openEvent(Number(button.dataset.eventId)));
      });
      document.querySelectorAll("[data-student-event-id]").forEach(button => {
        button.addEventListener("click", () => openStudentEvent(Number(button.dataset.studentEventId)));
      });
      document.querySelectorAll("[data-dept]").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedDept = button.dataset.dept;
          setPreference("selectedDept", state.selectedDept);
          renderDept();
          bindRenderedEvents();
        });
      });
      document.querySelectorAll("[data-nuga-grade]").forEach(button => {
        button.addEventListener("click", () => {
          state.nugaGrade = Number(button.dataset.nugaGrade);
          state.nugaCategory = "전체";
          setPreference("nugaGrade", state.nugaGrade);
          setPreference("nugaCategory", state.nugaCategory);
          render();
        });
      });
      document.querySelectorAll("[data-nuga-category]").forEach(button => {
        button.addEventListener("click", () => {
          state.nugaCategory = button.dataset.nugaCategory;
          setPreference("nugaCategory", state.nugaCategory);
          render();
        });
      });

      document.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => handleAction(button.dataset.action));
      });

      const requestForm = document.getElementById("requestForm");
      if (requestForm) {
        requestForm.addEventListener("submit", event => {
          event.preventDefault();
          submitRequest(requestForm);
        });
        const textarea = document.getElementById("reqContent");
        textarea.addEventListener("input", () => {
          document.getElementById("reqCount").textContent = String(textarea.value.length);
        });
      }
    }

    function handleAction(action) {
      if (action === "prev-month") changeMonth(-1);
      else if (action === "next-month") changeMonth(1);
      else if (action === "today") goToday();
      else if (action === "print") window.print();
      else if (action === "calendar-month") { state.calendarMode = "month"; setPreference("calendarMode", state.calendarMode); render(); }
      else if (action === "calendar-list") { state.calendarMode = "list"; setPreference("calendarMode", state.calendarMode); render(); }
      else if (action === "drawer-close") document.getElementById("dayDrawer")?.classList.remove("open");
      else if (action === "clear-search") { el.search.value = ""; state.query = ""; state.tokens = []; el.searchClear.classList.remove("visible"); render(); }
      else if (action === "toggle-weekends") {
        state.showWeekends = !state.showWeekends;
        setPreference("showWeekends", state.showWeekends);
        render();
      } else if (action === "plan-dept") {
        state.planShowDept = !state.planShowDept;
        setPreference("planShowDept", state.planShowDept);
        render();
      } else if (action === "plan-prayer") {
        state.planShowPrayer = !state.planShowPrayer;
        setPreference("planShowPrayer", state.planShowPrayer);
        render();
      } else if (action === "plan-super") {
        state.planShowSuper = !state.planShowSuper;
        setPreference("planShowSuper", state.planShowSuper);
        render();
      } else if (action === "plan-horizontal") {
        state.planHorizontal = !state.planHorizontal;
        setPreference("planHorizontal", state.planHorizontal);
        render();
      } else if (action === "student-weekends") {
        state.studentShowWeekends = !state.studentShowWeekends;
        setPreference("studentShowWeekends", state.studentShowWeekends);
        render();
      } else if (action === "student-horizontal") {
        state.studentHorizontal = !state.studentHorizontal;
        setPreference("studentHorizontal", state.studentHorizontal);
        render();
      }
    }

    document.getElementById("tabStrip").addEventListener("click", event => {
      const button = event.target.closest("[data-tab]");
      if (button) switchTab(button.dataset.tab);
    });

    el.search.addEventListener("input", () => {
      state.query = normalizeQuery(el.search.value);
      state.tokens = state.query ? state.query.split(" ").filter(Boolean) : [];
      el.searchClear.classList.toggle("visible", Boolean(state.query));
      render();
    });

    el.searchClear.addEventListener("click", () => {
      el.search.value = "";
      state.query = "";
      state.tokens = [];
      el.searchClear.classList.remove("visible");
      el.search.focus();
      render();
    });

    document.getElementById("refreshBtn").addEventListener("click", () => loadData());
    document.getElementById("retryBtn").addEventListener("click", () => loadData());
    document.getElementById("themeBtn").addEventListener("click", toggleTheme);
    document.getElementById("densityBtn").addEventListener("click", cycleDensity);
    document.getElementById("noticeOpenBtn").addEventListener("click", () => {
      document.getElementById("noticeModal").classList.add("visible");
    });


    document.querySelectorAll(".modal-close").forEach(button => button.addEventListener("click", closeModals));
    document.querySelectorAll(".modal").forEach(modal => {
      modal.addEventListener("click", event => {
        if (event.target === modal) closeModals();
      });
    });

    document.getElementById("brandHome").addEventListener("click", () => loadData());
    document.getElementById("brandHome").addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") loadData();
    });

    document.addEventListener("keydown", event => {
      const tag = document.activeElement?.tagName;
      const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(tag);

      if (event.key === "Escape") {
        if (state.query) { el.search.value = ""; state.query = ""; state.tokens = []; el.searchClear.classList.remove("visible"); render(); }
        else closeModals();
      }
      if (!editing && event.key === "/") {
        event.preventDefault();
        el.search.focus();
      }
      if (!editing && event.key.toLowerCase() === "t") goToday();
      if (!editing && event.altKey && event.key === "ArrowLeft") changeMonth(-1);
      if (!editing && event.altKey && event.key === "ArrowRight") changeMonth(1);
    });

    window.addEventListener("online", () => toast("네트워크 연결 복구", "데이터 새로고침을 실행합니다.", "success") || loadData({ silent: true }));
    window.addEventListener("offline", () => toast("오프라인 상태", "현재 화면의 데이터는 유지되지만 새로고침할 수 없습니다.", "error"));

    applyPreferences();
    render();
    loadData({ silent: true });
    setInterval(() => {
      if (!document.hidden && navigator.onLine && !state.loading) loadData({ silent: true });
    }, 5 * 60 * 1000);
  </script>
</body>
</html>
