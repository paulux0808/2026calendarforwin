<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#2563eb">
  <title>학사 캘린더</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f9;
      --surface-3: #e5ebf3;
      --text: #172033;
      --muted: #60708a;
      --line: #d6deea;
      --line-strong: #aab7ca;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --primary-soft: #dbeafe;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --warning: #b45309;
      --warning-soft: #fef3c7;
      --success: #047857;
      --success-soft: #d1fae5;
      --shadow: 0 14px 40px rgba(30, 64, 175, 0.10);
      --shadow-sm: 0 6px 18px rgba(15, 23, 42, 0.08);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font-size: 14px;
      --calendar-min-height: 142px;
      --gap: 12px;
      --header-h: 74px;
      --sat: #e0f2fe;
      --sun: #ffe4e6;
      --today: #fff7cc;
      --focus: 0 0 0 3px rgba(37, 99, 235, .22);
    }

    body[data-theme="dark"] {
      --bg: #0f172a;
      --surface: #172033;
      --surface-2: #202c42;
      --surface-3: #2a3850;
      --text: #eef4ff;
      --muted: #aab9cf;
      --line: #34445d;
      --line-strong: #50627d;
      --primary: #60a5fa;
      --primary-strong: #93c5fd;
      --primary-soft: #1e3a5f;
      --danger: #fb7185;
      --danger-soft: #4c1d2b;
      --warning: #fbbf24;
      --warning-soft: #4a3610;
      --success: #34d399;
      --success-soft: #103c31;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --shadow-sm: 0 8px 24px rgba(0, 0, 0, .22);
      --sat: #123a57;
      --sun: #4a2029;
      --today: #463d13;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% -10%, rgba(59,130,246,.12), transparent 35%),
        radial-gradient(circle at 100% 10%, rgba(14,165,233,.08), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--font-size);
      overflow: hidden;
    }
    button, input, select, textarea { font: inherit; }
    button { color: inherit; }
    :focus-visible { outline: none; box-shadow: var(--focus); }
    .sr-only {
      position: absolute !important;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 238px minmax(0, 1fr);
      overflow: hidden;
    }

    .sidebar {
      position: relative;
      z-index: 40;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 20px 14px 14px;
      color: #e8eef9;
      background:
        radial-gradient(circle at 15% 0%, rgba(59,130,246,.26), transparent 34%),
        linear-gradient(180deg, #152238 0%, #111b2d 56%, #0d1626 100%);
      border-right: 1px solid rgba(255,255,255,.08);
      box-shadow: 16px 0 45px rgba(15,23,42,.12);
    }
    .sidebar .brand { padding: 0 7px 20px; }
    .sidebar .brand-title { color: #fff; }
    .sidebar .brand-meta { color: #9fb0ca; }
    .sidebar .brand-mark {
      background: linear-gradient(135deg, #60a5fa, #2563eb);
      box-shadow: 0 12px 28px rgba(37,99,235,.35);
    }
    .sidebar-label {
      padding: 0 11px 8px;
      color: #7f91ad;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 12px 7px 0;
      border-top: 1px solid rgba(255,255,255,.08);
      display: grid;
      gap: 8px;
    }
    .sidebar-tip {
      color: #8fa1bc;
      font-size: 10.5px;
      font-weight: 650;
      line-height: 1.55;
    }
    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .app-header {
      position: relative;
      z-index: 30;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 16px rgba(15,23,42,.035);
    }

    .header-row {
      max-width: 1720px;
      margin: 0 auto;
      padding: 14px clamp(14px, 2vw, 30px);
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }
    .brand-mark {
      width: 42px; height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      box-shadow: 0 9px 22px rgba(37,99,235,.28);
      font-size: 21px;
      flex: 0 0 auto;
    }
    .brand-copy { min-width: 0; }
    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .brand-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }

    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--muted);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--muted) 16%, transparent);
    }
    .sync-dot.loading { background: var(--warning); animation: pulse 1.1s infinite; }
    .sync-dot.ok { background: var(--success); }
    .sync-dot.partial, .sync-dot.error { background: var(--danger); }
    @keyframes pulse { 50% { opacity: .35; } }

    .global-search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .search-wrap {
      min-width: 0;
      flex: 1;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 42px;
      padding: 0 42px 0 39px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 700;
      transition: .18s ease;
    }
    .search-input:hover { border-color: var(--line-strong); }
    .search-input:focus {
      background: var(--surface);
      border-color: var(--primary);
    }
    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      width: 28px; height: 28px;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: none;
    }
    .search-clear.visible { display: grid; place-items: center; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .icon-btn, .action-btn, .tab-btn, .chip-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 12px;
      min-height: 38px;
      font-weight: 800;
      cursor: pointer;
      transition: .16s ease;
    }
    .icon-btn {
      width: 40px;
      display: grid;
      place-items: center;
      font-size: 16px;
    }
    .action-btn {
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .icon-btn:hover, .action-btn:hover, .chip-btn:hover {
      border-color: var(--primary);
      color: var(--primary-strong);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .action-btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    .action-btn.danger {
      border-color: color-mix(in srgb, var(--danger) 50%, var(--line));
      color: var(--danger);
    }
    .action-btn:disabled, .icon-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .tab-strip {
      display: grid;
      gap: 5px;
      padding: 0;
      overflow: visible;
    }
    .tab-btn {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: #a9b8ce;
      text-align: left;
      white-space: nowrap;
      box-shadow: none;
    }
    .tab-btn::before {
      content: attr(data-icon);
      width: 23px;
      color: #7f91ad;
      font-size: 15px;
      text-align: center;
    }
    .tab-btn:hover {
      background: rgba(255,255,255,.07);
      color: #fff;
      transform: none;
      box-shadow: none;
    }
    .tab-btn.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(59,130,246,.95), rgba(37,99,235,.82));
      border-color: rgba(147,197,253,.3);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }
    .tab-btn.active::before { color: #fff; }
    .tab-btn[data-tab="request"] { margin-top: 9px; color: #fda4af; }
    .tab-btn[data-tab="request"].active { background: linear-gradient(135deg, #e11d48, #be123c); border-color: rgba(253,164,175,.35); color: #fff; }

    .main-scroll {
      overflow-y: auto;
      overscroll-behavior: contain;
      scroll-padding-top: 18px;
    }
    .page {
      max-width: 1720px;
      margin: 0 auto;
      padding: 18px clamp(14px, 2vw, 30px) 72px;
    }

    .notice-banner, .load-banner {
      display: none;
      margin-bottom: 14px;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid;
      box-shadow: var(--shadow-sm);
    }
    .notice-banner.visible, .load-banner.visible { display: block; }
    .notice-banner {
      background: var(--primary-soft);
      border-color: color-mix(in srgb, var(--primary) 45%, var(--line));
    }
    .load-banner {
      background: var(--danger-soft);
      border-color: color-mix(in srgb, var(--danger) 45%, var(--line));
    }
    .banner-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .banner-title { font-weight: 900; }
    .banner-detail { margin-top: 3px; color: var(--muted); font-weight: 650; line-height: 1.45; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .month-nav {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 15px;
      box-shadow: var(--shadow-sm);
    }
    .month-title {
      min-width: 130px;
      padding: 0 8px;
      font-size: 19px;
      font-weight: 900;
      text-align: center;
      letter-spacing: -.02em;
    }
    .month-nav .icon-btn {
      width: 34px; height: 34px; min-height: 34px;
      border: 0;
      background: var(--surface-2);
      box-shadow: none;
    }
    .chip-btn {
      min-height: 36px;
      padding: 0 11px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12.5px;
    }
    .chip-btn.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary-strong);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
    }
    .panel-title {
      font-size: 15px;
      font-weight: 900;
    }
    .panel-desc {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
    }

    .calendar-wrap {
      padding: 13px;
      overflow-x: auto;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(var(--calendar-cols, 5), minmax(150px, 1fr));
      gap: var(--gap);
      min-width: calc(var(--calendar-cols, 5) * 150px);
    }
    .cal-head {
      padding: 10px 8px;
      text-align: center;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 900;
    }
    .cal-head.sat { background: var(--sat); color: #075985; }
    .cal-head.sun { background: var(--sun); color: #9f1239; }
    body[data-theme="dark"] .cal-head.sat { color: #bae6fd; }
    body[data-theme="dark"] .cal-head.sun { color: #fecdd3; }

    .cal-cell {
      position: relative;
      min-height: var(--calendar-min-height);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 10px;
      transition: .16s ease;
      overflow: hidden;
    }
    .cal-cell:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
    .cal-cell.other-month { opacity: .44; background: var(--surface-2); }
    .cal-cell.today { background: var(--today); border: 2px solid #eab308; }
    .cal-cell.sat { background: color-mix(in srgb, var(--sat) 58%, var(--surface)); }
    .cal-cell.sun { background: color-mix(in srgb, var(--sun) 58%, var(--surface)); }
    .cal-date {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 8px;
      font-weight: 950;
    }
    .date-num {
      width: 30px; height: 30px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: var(--surface-2);
    }
    .today .date-num { background: #eab308; color: #111827; }
    .day-count {
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 800;
    }
    .events {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .event-item {
      display: grid;
      grid-template-columns: auto minmax(0,1fr);
      gap: 6px;
      align-items: start;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: inherit;
    }
    .event-item:hover .event-text { color: var(--primary-strong); text-decoration: underline; }
    .dept-tag {
      max-width: 78px;
      padding: 3px 6px;
      border-radius: 7px;
      border: 1px solid rgba(15,23,42,.10);
      color: #111827;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-text {
      min-width: 0;
      padding-top: 2px;
      font-size: calc(var(--font-size) - 2px);
      font-weight: 720;
      line-height: 1.38;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .no-event {
      padding: 12px 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }


    .calendar-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }
    .calendar-panel { min-width: 0; }
    .cal-cell { cursor: pointer; }
    .cal-cell.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent), var(--shadow-sm);
    }
    .day-drawer {
      position: sticky;
      top: 14px;
      max-height: calc(100vh - 122px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .drawer-head {
      padding: 17px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(145deg, var(--surface), var(--surface-2));
    }
    .drawer-eyebrow {
      color: var(--primary-strong);
      font-size: 10.5px;
      font-weight: 950;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    .drawer-date {
      margin-top: 5px;
      font-size: 23px;
      font-weight: 950;
      letter-spacing: -.035em;
    }
    .drawer-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
    }
    .drawer-body { padding: 14px; overflow: auto; }
    .drawer-section + .drawer-section { margin-top: 16px; }
    .drawer-section-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .drawer-event {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }
    .drawer-event + .drawer-event { margin-top: 7px; }
    .drawer-event:hover { border-color: var(--primary); background: var(--primary-soft); }
    .drawer-meta-card {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
      line-height: 1.55;
    }
    .drawer-meta-card + .drawer-meta-card { margin-top: 7px; }
    .drawer-meta-label { color: var(--muted); font-size: 10.5px; font-weight: 900; }
    .drawer-meta-value { margin-top: 3px; font-weight: 760; white-space: pre-wrap; }
    .drawer-foot {
      padding: 11px 14px;
      display: flex;
      gap: 7px;
      border-top: 1px solid var(--line);
      background: var(--surface-2);
    }
    .drawer-foot .action-btn { flex: 1; }
    .drawer-empty {
      min-height: 210px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      font-weight: 700;
    }
    .calendar-more {
      width: 100%;
      padding: 5px 7px;
      border: 0;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--primary-strong);
      text-align: left;
      font-size: 10.5px;
      font-weight: 900;
      cursor: pointer;
    }
    .search-results {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      align-items: start;
    }
    .search-result-list { display: grid; gap: 8px; padding: 12px; }
    .search-result {
      width: 100%;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }
    .search-result:hover { border-color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .search-result-date { font-weight: 900; }
    .search-result-main { min-width: 0; }
    .search-result-type { color: var(--muted); font-size: 10.5px; font-weight: 850; }
    .search-result-text { margin-top: 3px; font-weight: 760; line-height: 1.45; }
    .search-result-arrow { color: var(--muted); font-size: 18px; }
    .search-help {
      position: sticky;
      top: 14px;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }
    .search-help-title { font-weight: 950; }
    .search-help p { margin: 8px 0 0; color: var(--muted); font-size: 11.5px; font-weight: 650; line-height: 1.6; }

    .table-scroll { overflow: auto; }
    .data-table {
      width: 100%;
      min-width: 850px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }
    .data-table th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: var(--surface-2);
      color: var(--muted);
      border-bottom: 1px solid var(--line-strong);
      padding: 10px 8px;
      font-size: 11px;
      font-weight: 900;
    }
    .data-table td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 8px;
      text-align: center;
      vertical-align: top;
    }
    .data-table td:last-child, .data-table th:last-child { border-right: 0; }
    .data-table tr:last-child td { border-bottom: 0; }
    .data-table tr.today-row { outline: 3px solid #eab308; outline-offset: -3px; }
    .data-table tr.sat-row { background: color-mix(in srgb, var(--sat) 55%, var(--surface)); }
    .data-table tr.sun-row { background: color-mix(in srgb, var(--sun) 55%, var(--surface)); }
    .table-events {
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
    }
    .table-events.horizontal {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
    }
    .table-event {
      display: grid;
      grid-template-columns: auto minmax(0,1fr);
      gap: 7px;
      align-items: start;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      min-width: 0;
    }
    .table-event:hover { color: var(--primary-strong); }
    .meta-stack {
      display: grid;
      gap: 3px;
      text-align: left;
      line-height: 1.35;
    }
    .meta-label { color: var(--muted); font-size: 10.5px; font-weight: 800; }
    .meta-value { font-weight: 750; word-break: keep-all; overflow-wrap: anywhere; }

    .mobile-cards {
      display: none;
      padding: 12px;
      gap: 9px;
    }
    .mobile-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 12px;
      background: var(--surface);
    }
    .mobile-card.today-card { border: 2px solid #eab308; background: var(--today); }
    .mobile-card-date {
      font-weight: 950;
      margin-bottom: 9px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--line);
    }
    .mobile-card-meta {
      margin-top: 9px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 7px;
    }
    .meta-box {
      padding: 8px;
      border-radius: 10px;
      background: var(--surface-2);
      min-width: 0;
    }

    .filter-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-label {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 900;
      margin-right: 2px;
    }
    .select {
      min-height: 38px;
      padding: 0 36px 0 11px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font-weight: 800;
    }

    .dept-layout {
      display: grid;
      grid-template-columns: 250px minmax(0,1fr);
      gap: 12px;
      align-items: start;
    }
    .dept-sidebar {
      position: sticky;
      top: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      padding: 10px;
      box-shadow: var(--shadow-sm);
      max-height: calc(100vh - 190px);
      overflow: auto;
    }
    .dept-btn {
      width: 100%;
      min-height: 38px;
      padding: 0 10px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .dept-btn:hover { background: var(--surface-2); color: var(--text); }
    .dept-btn.active { background: var(--primary); color: #fff; }
    .count-badge {
      min-width: 25px;
      height: 21px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: var(--surface-3);
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }
    .dept-btn.active .count-badge { background: rgba(255,255,255,.2); color: #fff; }
    .timeline {
      display: grid;
      gap: 12px;
    }
    .month-section {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .month-section-title {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
      font-size: 15px;
      font-weight: 900;
    }
    .dept-event-list { padding: 8px 14px 14px; }
    .dept-event-card {
      display: grid;
      grid-template-columns: 88px minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px dashed var(--line);
    }
    .dept-event-card:last-child { border-bottom: 0; }
    .dept-date { font-weight: 900; }
    .dept-event-text { min-width: 0; font-weight: 760; line-height: 1.45; }
    .link-btn {
      border: 0;
      background: transparent;
      color: var(--primary-strong);
      font-weight: 900;
      cursor: pointer;
    }

    .nuga-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
      gap: 9px;
      margin: 12px 0;
    }
    .nuga-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 12px;
      background: var(--surface);
      cursor: pointer;
      text-align: left;
      transition: .16s ease;
    }
    .nuga-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .nuga-card.active { border-color: var(--primary); box-shadow: var(--focus); }
    .nuga-card-label { color: var(--muted); font-size: 11px; font-weight: 900; }
    .nuga-card-value { margin-top: 5px; font-size: 21px; font-weight: 950; }

    .request-layout {
      display: grid;
      grid-template-columns: minmax(0, .78fr) minmax(320px, 1.22fr);
      gap: 14px;
      align-items: start;
    }
    .info-card, .form-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 28px);
    }
    .info-card {
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--primary-soft) 80%, var(--surface)), var(--surface));
    }
    .info-card h2, .form-card h2 {
      margin: 0;
      font-size: 23px;
      letter-spacing: -.03em;
    }
    .info-card p, .form-card p {
      color: var(--muted);
      font-weight: 650;
      line-height: 1.65;
    }
    .guide-list {
      display: grid;
      gap: 9px;
      margin-top: 18px;
    }
    .guide-item {
      display: grid;
      grid-template-columns: 28px minmax(0,1fr);
      gap: 9px;
      align-items: start;
      font-weight: 750;
      line-height: 1.45;
    }
    .guide-num {
      width: 27px; height: 27px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-weight: 900;
    }
    .form-grid {
      display: grid;
      gap: 14px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label { font-weight: 900; }
    .field small { color: var(--muted); font-weight: 650; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
      color: var(--text);
      padding: 11px 12px;
      font-weight: 700;
    }
    .form-textarea { min-height: 180px; resize: vertical; line-height: 1.55; }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--primary);
      background: var(--surface);
    }
    .submit-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .empty-state {
      padding: 56px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty-icon { font-size: 34px; margin-bottom: 9px; }
    .empty-title { color: var(--text); font-size: 16px; font-weight: 900; }
    .empty-desc { margin-top: 5px; font-weight: 650; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(12px);
    }
    .loading-overlay.visible { display: grid; }
    .loading-card {
      width: min(390px, calc(100vw - 32px));
      padding: 25px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .loader {
      width: 48px; height: 48px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 5px solid var(--surface-3);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-list {
      margin-top: 14px;
      display: grid;
      gap: 5px;
      text-align: left;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15,23,42,.58);
      backdrop-filter: blur(6px);
    }
    .modal.visible { display: flex; }
    .modal-card {
      width: min(680px, 100%);
      max-height: min(82vh, 760px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 28px 80px rgba(0,0,0,.32);
      display: grid;
      grid-template-rows: auto minmax(0,1fr) auto;
    }
    .modal-head, .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 17px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }
    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }
    .modal-title { font-size: 17px; font-weight: 900; }
    .modal-body {
      padding: 18px;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.7;
      font-weight: 680;
    }

    .toast-region {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 120;
      display: grid;
      gap: 8px;
      width: min(380px, calc(100vw - 36px));
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--primary);
      border-radius: 13px;
      background: var(--surface);
      box-shadow: var(--shadow);
      animation: toast-in .2s ease;
    }
    .toast.error { border-left-color: var(--danger); }
    .toast.success { border-left-color: var(--success); }
    .toast-title { font-weight: 900; }
    .toast-message { margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.45; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(7px); } }

    body[data-density="compact"] {
      --font-size: 13px;
      --calendar-min-height: 118px;
      --gap: 8px;
    }
    body[data-density="comfortable"] {
      --font-size: 15px;
      --calendar-min-height: 166px;
      --gap: 14px;
    }

    @media (max-width: 1100px) {
      .header-row { grid-template-columns: minmax(190px, auto) minmax(220px,1fr) auto; }
      .header-actions .action-label { display: none; }
      .header-actions .action-btn { width: 40px; padding: 0; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .request-layout { grid-template-columns: 1fr; }
      .dept-layout { grid-template-columns: 210px minmax(0,1fr); }
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .app-shell { height: auto; min-height: 100vh; overflow: visible; }
      .app-header { position: sticky; top: 0; }
      .header-row {
        grid-template-columns: 1fr auto;
        padding-bottom: 8px;
      }
      .global-search { grid-column: 1 / -1; grid-row: 2; }
      .brand-meta { max-width: 210px; overflow: hidden; text-overflow: ellipsis; }
      .main-scroll { overflow: visible; }
      .page { padding-top: 12px; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .month-title { min-width: 108px; font-size: 17px; }
      .calendar-grid { grid-template-columns: 1fr; min-width: 0; }
      .cal-head { display: none; }
      .cal-cell {
        min-height: 0;
        display: grid;
        grid-template-columns: 56px minmax(0,1fr);
        gap: 9px;
      }
      .cal-date { align-content: start; flex-direction: column; justify-content: flex-start; margin: 0; }
      .date-num { width: 42px; height: 42px; font-size: 16px; }
      .day-count { text-align: center; }
      .desktop-table { display: none; }
      .mobile-cards { display: grid; }
      .dept-layout { grid-template-columns: 1fr; }
      .dept-sidebar {
        position: static;
        display: flex;
        overflow-x: auto;
        max-height: none;
      }
      .dept-btn { width: auto; min-width: max-content; }
      .dept-event-card { grid-template-columns: 74px minmax(0,1fr); }
      .dept-event-card .link-btn { grid-column: 2; justify-self: start; }
      .request-layout { grid-template-columns: 1fr; }
      .toolbar { align-items: stretch; }
      .toolbar-left, .toolbar-right { width: 100%; }
      .toolbar-right { justify-content: flex-start; }
      .panel { border-radius: 17px; }
      .modal { padding: 10px; }
    }

    @media (max-width: 430px) {
      .brand-meta { display: none; }
      .brand-title { font-size: 16px; }
      .brand-mark { width: 38px; height: 38px; }
      .header-actions { gap: 4px; }
      .header-actions .icon-btn, .header-actions .action-btn { width: 37px; min-height: 37px; }
      .summary-grid { grid-template-columns: 1fr 1fr; gap: 7px; }
      .summary-value { font-size: 19px; }
      .mobile-card-meta { grid-template-columns: 1fr; }
    }


    @media (max-width: 1280px) {
      .app-shell { grid-template-columns: 206px minmax(0, 1fr); }
      .calendar-layout { grid-template-columns: minmax(0, 1fr) 320px; }
    }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .app-shell { height: auto; min-height: 100vh; display: block; overflow: visible; }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 60;
        padding: 9px 12px;
        display: block;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.1);
      }
      .sidebar .brand { padding: 0 2px 8px; }
      .sidebar .brand-meta, .sidebar-label, .sidebar-footer { display: none; }
      .tab-strip { display: flex; gap: 5px; overflow-x: auto; }
      .tab-btn { width: auto; min-width: max-content; min-height: 37px; padding: 0 10px; }
      .tab-btn::before { width: auto; }
      .tab-btn[data-tab="request"] { margin-top: 0; }
      .workspace { overflow: visible; display: block; }
      .app-header { position: sticky; top: 103px; }
      .header-row { grid-template-columns: minmax(0, 1fr) auto; padding: 9px 12px; }
      .main-scroll { overflow: visible; }
      .page { padding: 12px 12px 72px; }
      .calendar-layout { display: block; }
      .day-drawer {
        position: fixed;
        left: 0; right: 0; bottom: 0; top: auto;
        z-index: 100;
        max-height: min(76vh, 680px);
        border-radius: 22px 22px 0 0;
        transform: translateY(calc(100% + 24px));
        transition: transform .22s ease;
        box-shadow: 0 -24px 70px rgba(15,23,42,.28);
      }
      .day-drawer.open { transform: translateY(0); }
      .drawer-foot { padding-bottom: calc(11px + env(safe-area-inset-bottom)); }
      .search-results { grid-template-columns: 1fr; }
      .search-help { position: static; }
      .search-result { grid-template-columns: 76px minmax(0,1fr) auto; }
    }

    @media print {
      @page { size: A4 portrait; margin: 8mm; }
      body { overflow: visible !important; background: #fff !important; color: #000 !important; }
      .app-shell, .main-scroll { display: block !important; height: auto !important; overflow: visible !important; }
      .app-header, .sidebar, .notice-banner, .load-banner, .toolbar .no-print,
      .mobile-cards, .toast-region, .loading-overlay, .modal, .day-drawer { display: none !important; }
      .page { max-width: none; padding: 0; }
      .panel { box-shadow: none; border: 0; border-radius: 0; overflow: visible; }
      .panel-head { background: #fff !important; padding: 0 0 8px; }
      .desktop-table { display: block !important; }
      .table-scroll { overflow: visible; }
      .data-table {
        min-width: 0 !important;
        width: 100% !important;
        font-size: 9pt !important;
        color: #000 !important;
        background: #fff !important;
      }
      .data-table th {
        position: static;
        background: #eee !important;
        color: #000 !important;
        border: 1px solid #000 !important;
        padding: 3px !important;
      }
      .data-table td {
        color: #000 !important;
        border: 1px solid #000 !important;
        padding: 3px !important;
      }
      .dept-tag { color: #000 !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .sat-row, .sun-row { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body data-theme="light" data-density="standard">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand" role="button" tabindex="0" aria-label="학사 캘린더 새로고침" id="brandHome">
        <div class="brand-mark" aria-hidden="true">학</div>
        <div class="brand-copy">
          <h1 class="brand-title">학사 캘린더</h1>
          <div class="brand-meta"><span class="sync-dot loading" id="syncDot"></span><span id="syncText">연결 준비 중</span></div>
        </div>
      </div>
      <div class="sidebar-label">업무 메뉴</div>
      <nav class="tab-strip" aria-label="주요 메뉴" id="tabStrip">
        <button class="tab-btn active" data-tab="calendar" data-icon="▦" type="button">달력 일정</button>
        <button class="tab-btn" data-tab="plan" data-icon="▤" type="button">월중 계획표</button>
        <button class="tab-btn" data-tab="student" data-icon="◫" type="button">학생 일정</button>
        <button class="tab-btn" data-tab="dept" data-icon="⌘" type="button">부서별 조회</button>
        <button class="tab-btn" data-tab="nuga" data-icon="✓" type="button">누가기록</button>
        <button class="tab-btn" data-tab="request" data-icon="＋" type="button">수정·추가 요청</button>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-tip">/ 검색 · T 오늘 · Alt+←/→ 월 이동</div>
      </div>
    </aside>

    <section class="workspace">
      <header class="app-header">
        <div class="header-row">
          <div class="global-search">
            <div class="search-wrap">
              <span class="search-icon" aria-hidden="true">⌕</span>
              <label class="sr-only" for="searchInput">일정 통합 검색</label>
              <input id="searchInput" class="search-input" type="search" autocomplete="off"
                     placeholder="행사명, 부서, 학생 일정, 누가기록 통합 검색 · / 키">
              <button id="searchClear" class="search-clear" type="button" aria-label="검색어 지우기">✕</button>
            </div>
          </div>
          <div class="header-actions">
            <button class="action-btn" id="refreshBtn" type="button" title="데이터 새로고침"><span aria-hidden="true">↻</span><span class="action-label">새로고침</span></button>
            <button class="icon-btn" id="densityBtn" type="button" title="화면 밀도 변경" aria-label="화면 밀도 변경">Aa</button>
            <button class="icon-btn" id="themeBtn" type="button" title="다크 모드" aria-label="다크 모드 전환">◐</button>
          </div>
        </div>
      </header>

      <main class="main-scroll" id="mainScroll">
        <div class="page">
          <section class="notice-banner" id="noticeBanner" aria-live="polite">
            <div class="banner-row"><div><div class="banner-title">공지사항</div><div class="banner-detail" id="noticePreview"></div></div><button class="action-btn" id="noticeOpenBtn" type="button">전체 보기</button></div>
          </section>
          <section class="load-banner" id="loadBanner" aria-live="assertive">
            <div class="banner-row"><div><div class="banner-title">일부 데이터를 불러오지 못했습니다.</div><div class="banner-detail" id="loadBannerDetail"></div></div><button class="action-btn danger" id="retryBtn" type="button">다시 시도</button></div>
          </section>
          <div id="viewRoot"></div>
        </div>
      </main>
    </section>
  </div>

  <div class="loading-overlay visible" id="loadingOverlay" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <div class="loader" aria-hidden="true"></div>
      <div style="font-size:18px;font-weight:900;">학사 데이터를 동기화하고 있습니다.</div>
      <div style="margin-top:6px;color:var(--muted);font-weight:650;">연결 가능한 데이터부터 안전하게 표시합니다.</div>
      <div class="load-list" id="loadingList"></div>
    </div>
  </div>

  <div class="modal" id="noticeModal" role="dialog" aria-modal="true" aria-labelledby="noticeModalTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title" id="noticeModalTitle">공지사항</div>
        <button class="icon-btn modal-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body" id="noticeModalBody"></div>
      <div class="modal-foot">
        <button class="action-btn primary modal-close" type="button">확인</button>
      </div>
    </div>
  </div>

  <div class="toast-region" id="toastRegion" aria-live="polite"></div>

  <script>
    "use strict";

    /* 데이터 원본 설정: 기존 Google Sheet / Apps Script 계약을 그대로 유지합니다. */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzk1DN0iDS7EdZvKq-iomzgxmiCzOwCUZwWZkN4fjvkzOZPdF1d3P9d1xt6Ii8VNnmmPQ/exec";
    const SHEET_ID = "10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg";
    const STUDENT_SCHEDULE_GID = "1112677469";

    const FIXED_DEPTS = [
      "교목부", "교무부", "연구부", "상담부", "정보부", "1학년부", "2학년부", "3학년부",
      "기획위원", "행정실", "국어과", "영어과", "수학과", "사회과", "과학과",
      "예체능과", "정보과", "외국어과", "기타"
    ];

    const SHEETS = [
      { key: "schedule", gid: "0", callback: "cb_schedule", label: "연중행사계획" },
      { key: "student", gid: STUDENT_SCHEDULE_GID, callback: "cb_student", label: "학생일정" },
      { key: "super", gid: "1459415616", callback: "cb_super", label: "자습감독" },
      { key: "prayer", gid: "1697887995", callback: "cb_prayer", label: "기도순서" },
      { key: "notice", gid: "1487091944", callback: "cb_notice", label: "공지사항" },
      { key: "nuga", gid: "2041576858", callback: "cb_nuga", label: "창체누가기록" }
    ];

    const PASTELS = [
      "#ffd6a5", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff", "#ffadad",
      "#fdffb6", "#e2edff", "#d9ead3", "#fce5cd", "#cfe2f3", "#d9d2e9", "#ead1dc",
      "#f4cccc", "#c9daf8", "#d0e0e3", "#fff2cc", "#e9ecef"
    ];

    const NUGA_CATEGORY_COLORS = {
      "자율": "#a0c4ff",
      "봉사": "#caffbf",
      "동아리": "#ffd6a5",
      "진로": "#ffc6ff",
      "자율자치": "#bdb2ff",
      "전체": "#e2e8f0"
    };

    const state = {
      currentTab: "calendar",
      viewDate: new Date(new Date().getFullYear(), new Date().getMonth(), 1),
      query: "",
      tokens: [],
      theme: localStorage.getItem("calendar.theme") || "light",
      density: localStorage.getItem("calendar.density") || "standard",
      showWeekends: localStorage.getItem("calendar.showWeekends") === "true",
      planShowDept: localStorage.getItem("calendar.planShowDept") !== "false",
      planShowPrayer: localStorage.getItem("calendar.planShowPrayer") !== "false",
      planShowSuper: localStorage.getItem("calendar.planShowSuper") !== "false",
      planHorizontal: localStorage.getItem("calendar.planHorizontal") === "true",
      studentShowWeekends: localStorage.getItem("calendar.studentShowWeekends") === "true",
      studentHorizontal: localStorage.getItem("calendar.studentHorizontal") === "true",
      selectedDept: localStorage.getItem("calendar.selectedDept") || FIXED_DEPTS[0],
      nugaGrade: Number(localStorage.getItem("calendar.nugaGrade")) || 1,
      nugaCategory: localStorage.getItem("calendar.nugaCategory") || "전체",
      loading: false,
      lastSyncedAt: null,
      loadStatus: Object.create(null),
      loadErrors: Object.create(null),
      requestId: 0,
      openEventId: null,
      selectedDateKey: localStorage.getItem("calendar.selectedDateKey") || localDateKey(new Date()),
      calendarMode: localStorage.getItem("calendar.calendarMode") || "month"
    };

    const data = {
      schedule: [],
      students: [],
      supervisor: Object.create(null),
      prayer: Object.create(null),
      notice: [],
      nuga: []
    };

    const index = {
      eventSeq: 0,
      eventsById: Object.create(null),
      daysByKey: Object.create(null),
      dept: Object.create(null),
      studentEventSeq: 0,
      studentEventsById: Object.create(null),
      studentDaysByKey: Object.create(null)
    };

    const deptColors = Object.create(null);
    FIXED_DEPTS.forEach((dept, i) => { deptColors[dept] = PASTELS[i] || "#e9ecef"; });

    const el = {
      root: document.getElementById("viewRoot"),
      mainScroll: document.getElementById("mainScroll"),
      loading: document.getElementById("loadingOverlay"),
      loadingList: document.getElementById("loadingList"),
      loadBanner: document.getElementById("loadBanner"),
      loadBannerDetail: document.getElementById("loadBannerDetail"),
      noticeBanner: document.getElementById("noticeBanner"),
      noticePreview: document.getElementById("noticePreview"),
      noticeModalBody: document.getElementById("noticeModalBody"),
      syncDot: document.getElementById("syncDot"),
      syncText: document.getElementById("syncText"),
      search: document.getElementById("searchInput"),
      searchClear: document.getElementById("searchClear"),
      refreshBtn: document.getElementById("refreshBtn"),
      toastRegion: document.getElementById("toastRegion")
    };

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeQuery(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function highlightHTML(value) {
      const safe = escapeHTML(value);
      if (!state.tokens.length) return safe;
      const tokens = [...new Set(state.tokens)]
        .filter(Boolean)
        .sort((a, b) => b.length - a.length)
        .map(token => token.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
      if (!tokens.length) return safe;
      return safe.replace(new RegExp(`(${tokens.join("|")})`, "ig"), "<mark>$1</mark>");
    }

    function localDateKey(dateObj) {
      if (!(dateObj instanceof Date) || Number.isNaN(dateObj.getTime())) return "";
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function dateFromKey(key) {
      const [y, m, d] = String(key).split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function parseGDate(value) {
      if (!value) return null;
      if (value instanceof Date) return Number.isNaN(value.getTime()) ? null : value;

      if (typeof value === "number" && Number.isFinite(value)) {
        const utc = new Date(Math.round((value - 25569) * 86400 * 1000));
        if (!Number.isNaN(utc.getTime())) {
          return new Date(utc.getUTCFullYear(), utc.getUTCMonth(), utc.getUTCDate());
        }
      }

      if (typeof value === "object") {
        const direct = parseGDate(value.v);
        if (direct) return direct;
        return parseGDate(value.f);
      }

      const raw = String(value).trim();
      if (!raw || raw === "null" || raw === "undefined") return null;

      const gviz = raw.match(/Date\s*\(\s*(\d{4})\s*,\s*(\d{1,2})\s*,\s*(\d{1,2})/);
      if (gviz) {
        const result = new Date(Number(gviz[1]), Number(gviz[2]), Number(gviz[3]));
        return Number.isNaN(result.getTime()) ? null : result;
      }

      const full = raw.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
      if (full) {
        const result = new Date(Number(full[1]), Number(full[2]) - 1, Number(full[3]));
        return Number.isNaN(result.getTime()) ? null : result;
      }

      return null;
    }

    function getCellDisplay(cell) {
      if (cell == null) return "";
      if (typeof cell === "string" || typeof cell === "number") return String(cell).trim();
      if (cell.f != null && String(cell.f).trim() !== "") return String(cell.f).trim();
      if (cell.v != null && String(cell.v).trim() !== "") return String(cell.v).trim();
      return "";
    }

    function fallbackScheduleYear() {
      const first = data.schedule.find(item => item.date instanceof Date);
      return first ? first.date.getFullYear() : state.viewDate.getFullYear();
    }

    function parseStudentDateCell(cell) {
      if (cell && typeof cell === "object") {
        const rawDate = parseGDate(cell.v);
        if (rawDate) return rawDate;
      }

      const display = getCellDisplay(cell);
      const direct = parseGDate(display);
      if (direct) return direct;

      const md = display.match(/(\d{1,2})\s*[-./]\s*(\d{1,2})/);
      if (!md) return null;
      const result = new Date(fallbackScheduleYear(), Number(md[1]) - 1, Number(md[2]));
      return Number.isNaN(result.getTime()) ? null : result;
    }

    function stripLeadingDeptTag(text) {
      return String(text || "")
        .replace(/^\s*[-•]\s*/, "")
        .replace(/^\s*\[[^\]]+\]\s*/, "")
        .trim();
    }

    function extractStudentFallbackContent(dateText) {
      const raw = String(dateText || "").trim();
      const full = raw.match(/^\s*\d{4}\D+\d{1,2}\D+\d{1,2}\s*[월화수목금토일]?\s*(.*)$/);
      if (full) return stripLeadingDeptTag(full[1]);
      const md = raw.match(/^\s*\d{1,2}\s*[-./]\s*\d{1,2}\s*[월화수목금토일]?\s*(.*)$/);
      return md ? stripLeadingDeptTag(md[1]) : "";
    }

    function normalizeHeader(value) {
      return String(value || "").replace(/\s+/g, "").replace(/[()（）]/g, "").toLowerCase();
    }

    function normalizeCategory(value) {
      const raw = String(value || "").trim();
      if (!raw || raw === "null") return "";
      if (/자율.*자치|자치.*자율/.test(raw)) return "자율자치";
      if (raw.includes("자율")) return "자율";
      if (raw.includes("봉사")) return "봉사";
      if (raw.includes("동아리")) return "동아리";
      if (raw.includes("진로")) return "진로";
      return raw;
    }

    function isCheckedGrade(value) {
      const normalized = String(value ?? "").trim().toLowerCase();
      return ["1", "o", "○", "◯", "v", "✓", "✔", "true", "y"].includes(normalized);
    }

    function parsePeriods(cell) {
      let raw = getCellDisplay(cell);
      if (!raw && cell && typeof cell === "object") raw = getCellDisplay(cell.v);
      if (!raw) return { periods: "", hours: 0 };

      const display = raw.replace(/[\[\]]/g, "").replace(/\s+/g, "").replace(/교시/g, "");
      const normalized = display.replace(/[.，、\/|~\-–—]+/g, ",");
      const parts = normalized
        .split(",")
        .map(item => item.trim())
        .filter(item => item !== "" && /^\d+$/.test(item));

      return { periods: display || raw, hours: parts.length };
    }

    function matchesTokens(...values) {
      if (!state.tokens.length) return true;
      const haystack = values.join(" ").toLowerCase();
      return state.tokens.every(token => haystack.includes(token));
    }

    function formatSyncTime(date) {
      if (!date) return "동기화 전";
      return new Intl.DateTimeFormat("ko-KR", {
        month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit"
      }).format(date);
    }

    function toast(title, message = "", type = "") {
      const node = document.createElement("div");
      node.className = `toast ${type}`.trim();
      node.innerHTML = `<div class="toast-title">${escapeHTML(title)}</div>${message ? `<div class="toast-message">${escapeHTML(message)}</div>` : ""}`;
      el.toastRegion.appendChild(node);
      setTimeout(() => node.remove(), 4500);
    }

    function setPreference(key, value) {
      localStorage.setItem(`calendar.${key}`, String(value));
    }

    function applyPreferences() {
      document.body.dataset.theme = state.theme;
      document.body.dataset.density = state.density;
      document.getElementById("themeBtn").textContent = state.theme === "dark" ? "☀" : "◐";
      document.querySelector('meta[name="theme-color"]').setAttribute("content", state.theme === "dark" ? "#172033" : "#2563eb");
    }

    function cycleDensity() {
      const order = ["compact", "standard", "comfortable"];
      state.density = order[(order.indexOf(state.density) + 1) % order.length];
      setPreference("density", state.density);
      applyPreferences();
      toast("화면 밀도 변경", state.density === "compact" ? "좁게" : state.density === "comfortable" ? "넓게" : "기본");
    }

    function toggleTheme() {
      state.theme = state.theme === "dark" ? "light" : "dark";
      setPreference("theme", state.theme);
      applyPreferences();
    }

    function getVisibleDays() {
      return state.showWeekends ? [0,1,2,3,4,5,6] : [1,2,3,4,5];
    }

    function weekdayName(day) {
      return ["일", "월", "화", "수", "목", "금", "토"][day];
    }

    function rebuildIndexes() {
      index.eventSeq = 0;
      index.eventsById = Object.create(null);
      index.daysByKey = Object.create(null);
      index.dept = Object.create(null);

      data.schedule
        .sort((a, b) => a.date - b.date)
        .forEach(day => {
          const dateKey = localDateKey(day.date);
          if (!index.daysByKey[dateKey]) {
            index.daysByKey[dateKey] = { dateKey, date: day.date, eventIds: [] };
          }
          day.events.forEach(event => {
            const id = index.eventSeq++;
            index.eventsById[id] = { id, dateKey, dept: event.dept, text: event.text };
            index.daysByKey[dateKey].eventIds.push(id);
            if (!index.dept[event.dept]) index.dept[event.dept] = [];
            index.dept[event.dept].push(id);
          });
        });

      Object.values(index.dept).forEach(ids => {
        ids.sort((a, b) => {
          const left = index.eventsById[a];
          const right = index.eventsById[b];
          return left.dateKey.localeCompare(right.dateKey) || a - b;
        });
      });
    }

    function rebuildStudentIndexes() {
      index.studentEventSeq = 0;
      index.studentEventsById = Object.create(null);
      index.studentDaysByKey = Object.create(null);

      data.students
        .sort((a, b) => a.date - b.date)
        .forEach(day => {
          const dateKey = localDateKey(day.date);
          if (!index.studentDaysByKey[dateKey]) {
            index.studentDaysByKey[dateKey] = { dateKey, date: day.date, eventIds: [] };
          }
          day.events.forEach(text => {
            const id = index.studentEventSeq++;
            index.studentEventsById[id] = { id, dateKey, text };
            index.studentDaysByKey[dateKey].eventIds.push(id);
          });
        });
    }

    function alignViewDate() {
      const dates = data.schedule.map(item => item.date).filter(Boolean).sort((a,b) => a-b);
      if (!dates.length) return;
      const today = new Date();
      const sameMonth = dates.some(date => date.getFullYear() === today.getFullYear() && date.getMonth() === today.getMonth());
      if (sameMonth) {
        state.viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
        return;
      }
      const future = dates.find(date => date >= today) || dates[dates.length - 1];
      state.viewDate = new Date(future.getFullYear(), future.getMonth(), 1);
    }

    function ensureTabDate() {
      const source = state.currentTab === "student" ? data.students
        : ["calendar", "plan"].includes(state.currentTab) ? data.schedule
        : [];
      if (!source.length) return;
      const hasYear = source.some(item => item.date.getFullYear() === state.viewDate.getFullYear());
      if (hasYear) return;
      const first = source[0].date;
      state.viewDate = new Date(first.getFullYear(), first.getMonth(), 1);
    }

    function setLoadStatus(key, status, errorMessage = "") {
      state.loadStatus[key] = status;
      if (errorMessage) state.loadErrors[key] = errorMessage;
      else delete state.loadErrors[key];
      renderLoadingState();
    }

    function renderLoadingState() {
      el.loadingList.innerHTML = SHEETS.map(sheet => {
        const status = state.loadStatus[sheet.key] || "waiting";
        const symbol = status === "ok" ? "✓" : status === "error" ? "!" : status === "loading" ? "…" : "·";
        return `<div>${symbol} ${escapeHTML(sheet.label)}</div>`;
      }).join("");

      const statuses = SHEETS.map(sheet => state.loadStatus[sheet.key] || "waiting");
      const completed = statuses.filter(status => status === "ok" || status === "error").length;
      const errors = statuses.filter(status => status === "error").length;

      el.loading.classList.toggle("visible", state.loading && completed === 0);
      el.refreshBtn.disabled = state.loading;

      if (state.loading) {
        el.syncDot.className = "sync-dot loading";
        el.syncText.textContent = `동기화 중 ${completed}/${SHEETS.length}`;
      } else if (errors) {
        el.syncDot.className = errors === SHEETS.length ? "sync-dot error" : "sync-dot partial";
        el.syncText.textContent = `${formatSyncTime(state.lastSyncedAt)} · 일부 연결 실패`;
      } else {
        el.syncDot.className = "sync-dot ok";
        el.syncText.textContent = `${formatSyncTime(state.lastSyncedAt)} 동기화`;
      }

      const failedSheets = SHEETS.filter(sheet => state.loadStatus[sheet.key] === "error");
      el.loadBanner.classList.toggle("visible", failedSheets.length > 0);
      if (failedSheets.length) {
        el.loadBannerDetail.textContent = failedSheets
          .map(sheet => `${sheet.label}: ${state.loadErrors[sheet.key] || "응답 없음"}`)
          .join(" · ");
      }
    }

    function finishLoad(requestId) {
      if (requestId !== state.requestId) return;
      state.loading = false;
      state.lastSyncedAt = new Date();
      rebuildIndexes();
      rebuildStudentIndexes();
      if (!state.lastSyncedAt || !data.schedule.length) alignViewDate();
      renderLoadingState();
      updateNoticeUI();
      render();
    }

    function loadData({ silent = false } = {}) {
      state.requestId += 1;
      const requestId = state.requestId;
      state.loading = true;
      state.loadStatus = Object.create(null);
      state.loadErrors = Object.create(null);

      data.schedule = [];
      data.students = [];
      data.supervisor = Object.create(null);
      data.prayer = Object.create(null);
      data.notice = [];
      data.nuga = [];

      SHEETS.forEach(sheet => setLoadStatus(sheet.key, "loading"));
      renderLoadingState();

      let completed = 0;
      const timeoutIds = [];

      function completeSheet(sheet, ok, message = "") {
        if (requestId !== state.requestId) return;
        const current = state.loadStatus[sheet.key];
        if (current === "ok" || current === "error") return;
        setLoadStatus(sheet.key, ok ? "ok" : "error", message);
        completed += 1;
        if (completed >= SHEETS.length) finishLoad(requestId);
      }

      window.__sheetComplete = completeSheet;
      window.__activeLoadRequestId = requestId;

      SHEETS.forEach(sheet => {
        const script = document.createElement("script");
        script.dataset.calendarJsonp = sheet.key;
        const timeout = setTimeout(() => {
          script.remove();
          completeSheet(sheet, false, "12초 내 응답이 없습니다.");
        }, 12000);
        timeoutIds.push(timeout);

        const callbackName = `__calendar_${sheet.callback}_${requestId}`;
        window[callbackName] = payload => {
          clearTimeout(timeout);
          try {
            processSheet(sheet.key, payload);
            completeSheet(sheet, true);
          } catch (error) {
            console.error(`[${sheet.label}] 처리 오류`, error);
            completeSheet(sheet, false, error?.message || "데이터 처리 오류");
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        script.onerror = () => {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
          completeSheet(sheet, false, "시트 연결에 실패했습니다.");
        };

        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${callbackName}&gid=${sheet.gid}&_=${Date.now()}_${Math.random()}`;
        document.body.appendChild(script);
      });

      setTimeout(() => {
        timeoutIds.forEach(id => clearTimeout(id));
        if (requestId === state.requestId && state.loading) finishLoad(requestId);
      }, 13000);

      if (!silent) toast("데이터 새로고침", "Google 시트에서 최신 내용을 다시 불러옵니다.");
    }

    function processSheet(key, payload) {
      const rows = payload?.table?.rows || [];
      if (key === "schedule") processSchedule(rows);
      else if (key === "student") processStudents(rows);
      else if (key === "super") processSupervisor(rows);
      else if (key === "prayer") processPrayer(rows);
      else if (key === "notice") processNotice(rows);
      else if (key === "nuga") processNuga(payload);
    }

    function processSchedule(rows) {
      rows.forEach(row => {
        if (!row?.c?.[0]) return;
        const date = parseGDate(row.c[0].v ?? row.c[0]);
        const content = getCellDisplay(row.c[2]);
        if (!date || !content || content === "null") return;

        const events = content
          .split("\n")
          .map(line => line.trim())
          .filter(line => line && line !== "null" && line !== "익")
          .map(line => {
            const match = line.match(/^\[([^\]]+)\]/);
            let dept = match ? match[1].trim() : "기타";
            let text = match ? line.replace(match[0], "").trim() : line;
            if (!FIXED_DEPTS.includes(dept)) {
              dept = "기타";
              text = line;
            }
            return { dept, text };
          });

        if (events.length) data.schedule.push({ date, events });
      });
    }

    function processStudents(rows) {
      rows.forEach(row => {
        if (!row?.c?.[0]) return;
        const date = parseStudentDateCell(row.c[0]);
        if (!date) return;

        const primary = [];
        for (let i = 2; i < row.c.length; i += 1) {
          const value = getCellDisplay(row.c[i]);
          if (value && value !== "null") primary.push(value);
        }

        const secondary = [];
        for (let i = 1; i < row.c.length; i += 1) {
          const value = getCellDisplay(row.c[i]);
          if (!value || value === "null" || /^[월화수목금토일]$/.test(value)) continue;
          secondary.push(value);
        }

        let content = primary.join("\n").trim() || secondary.join("\n").trim();
        if (!content) content = extractStudentFallbackContent(getCellDisplay(row.c[0]));
        if (!content) return;

        const events = content
          .split("\n")
          .map(stripLeadingDeptTag)
          .filter(Boolean);

        if (events.length) data.students.push({ date, events });
      });
    }

    function processSupervisor(rows) {
      rows.forEach(row => {
        if (!row?.c?.[0]) return;
        const date = parseGDate(row.c[0].v ?? row.c[0]);
        const value = getCellDisplay(row.c[2]);
        if (date && value && value !== "null") data.supervisor[localDateKey(date)] = value;
      });
    }

    function processPrayer(rows) {
      rows.forEach(row => {
        if (!row?.c?.[0]) return;
        const date = parseGDate(row.c[0].v ?? row.c[0]);
        if (!date) return;
        const name = getCellDisplay(row.c[2]);
        const bible = getCellDisplay(row.c[3]);
        const hymn = getCellDisplay(row.c[4]);
        if (name || bible || hymn) data.prayer[localDateKey(date)] = { name, bible, hymn };
      });
    }

    function processNotice(rows) {
      const today = new Date();
      today.setHours(0,0,0,0);

      rows.forEach(row => {
        if (!row?.c || row.c.length < 3) return;
        const start = parseGDate(row.c[0]?.v ?? row.c[0]);
        const end = parseGDate(row.c[1]?.v ?? row.c[1]);
        const content = getCellDisplay(row.c[2]);
        if (!start || !end || !content) return;
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);
        if (today >= start && today <= end) {
          data.notice.push({ start, end, content });
        }
      });
    }

    function processNuga(payload) {
      const rows = payload?.table?.rows || [];
      const cols = payload?.table?.cols || [];
      const columnMap = Object.create(null);

      cols.forEach((column, idx) => {
        [column?.label, column?.id, column?.pattern].forEach(key => {
          const normalized = normalizeHeader(key);
          if (normalized) columnMap[normalized] = idx;
        });
      });

      const pick = (names, fallback) => {
        for (const name of names) {
          const normalized = normalizeHeader(name);
          if (Object.prototype.hasOwnProperty.call(columnMap, normalized)) return columnMap[normalized];
        }
        return fallback;
      };

      const idxCategory = pick(["영역"], 1);
      const idxDate = pick(["일자", "날짜"], 2);
      const idxPeriods = pick(["교시텍스트", "교시"], 3);
      const idxG1 = pick(["1학년", "1"], 4);
      const idxG2 = pick(["2학년", "2"], 5);
      const idxG3 = pick(["3학년", "3"], 6);
      const idxContent = pick(["활동내용", "내용"], 7);
      const idxRemark = pick(["비고"], 8);

      rows.forEach(row => {
        if (!row?.c) return;
        const rawCategory = normalizeCategory(getCellDisplay(row.c[idxCategory]));
        const date = parseGDate(row.c[idxDate]?.f ?? row.c[idxDate]?.v ?? row.c[idxDate]);
        const { periods, hours } = parsePeriods(row.c[idxPeriods]);
        const content = getCellDisplay(row.c[idxContent]);
        const remark = getCellDisplay(row.c[idxRemark]);
        if (!rawCategory || !date) return;

        const autoVol = rawCategory === "자율" || rawCategory === "봉사";
        data.nuga.push({
          rawCategory,
          displayCategory: {
            1: autoVol ? "자율자치" : rawCategory,
            2: autoVol ? "자율자치" : rawCategory,
            3: rawCategory
          },
          date,
          dateKey: localDateKey(date),
          dayOfWeek: weekdayName(date.getDay()),
          periods,
          hours,
          grades: [
            isCheckedGrade(getCellDisplay(row.c[idxG1])),
            isCheckedGrade(getCellDisplay(row.c[idxG2])),
            isCheckedGrade(getCellDisplay(row.c[idxG3]))
          ],
          content,
          remark
        });
      });

      data.nuga.sort((a, b) => a.date - b.date);
    }

    function updateNoticeUI() {
      const visible = data.notice.length > 0;
      el.noticeBanner.classList.toggle("visible", visible);
      if (!visible) return;
      const combined = data.notice.map(item => item.content).join("\n\n");
      el.noticePreview.textContent = combined.replace(/\s+/g, " ").slice(0, 180) + (combined.length > 180 ? "…" : "");
      el.noticeModalBody.textContent = combined;
    }

    function tabTitle() {
      const map = {
        calendar: "달력 일정",
        plan: "월중 계획표",
        student: "학생 일정",
        dept: "부서별 조회",
        nuga: "창체 누가기록",
        request: "수정·추가 요청"
      };
      return map[state.currentTab] || "";
    }

    function monthToolbar(extra = "") {
      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth() + 1;
      return `
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="month-nav">
              <button class="icon-btn" type="button" data-action="prev-month" aria-label="이전 달">‹</button>
              <div class="month-title">${y}년 ${m}월</div>
              <button class="icon-btn" type="button" data-action="next-month" aria-label="다음 달">›</button>
            </div>
            <button class="chip-btn" type="button" data-action="today">오늘</button>
          </div>
          <div class="toolbar-right">${extra}</div>
        </div>`;
    }

    function render() {
      ensureTabDate();
      document.querySelectorAll(".tab-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === state.currentTab);
      });

      if (state.query && state.currentTab !== "request") renderSearchResults();
      else if (state.currentTab === "calendar") renderCalendar();
      else if (state.currentTab === "plan") renderPlan();
      else if (state.currentTab === "student") renderStudent();
      else if (state.currentTab === "dept") renderDept();
      else if (state.currentTab === "nuga") renderNuga();
      else if (state.currentTab === "request") renderRequest();

      bindRenderedEvents();
    }

    function renderCalendar() {
      const weekendsButton = `<button class="chip-btn ${state.showWeekends ? "active" : ""}" type="button" data-action="toggle-weekends">주말</button>`;
      const modeButtons = `<button class="chip-btn ${state.calendarMode === "month" ? "active" : ""}" type="button" data-action="calendar-month">월간</button><button class="chip-btn ${state.calendarMode === "list" ? "active" : ""}" type="button" data-action="calendar-list">목록</button>`;
      const printButton = `<button class="chip-btn no-print" type="button" data-action="print">인쇄</button>`;
      const visibleDays = getVisibleDays();
      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth();
      const monthPrefix = `${y}-${String(m + 1).padStart(2, "0")}`;
      const monthCount = Object.values(index.eventsById).filter(event => event.dateKey.startsWith(monthPrefix)).length;

      if (!state.selectedDateKey || !state.selectedDateKey.startsWith(monthPrefix)) {
        const todayKey = localDateKey(new Date());
        state.selectedDateKey = todayKey.startsWith(monthPrefix) ? todayKey : `${monthPrefix}-01`;
      }

      const toolbar = monthToolbar(`${modeButtons}${weekendsButton}${printButton}`);
      const title = `<div class="panel-head"><div><div class="panel-title">${y}년 ${m + 1}월 학사 일정 · ${monthCount}건</div><div class="panel-desc">날짜를 선택하면 오른쪽에서 그날의 전체 일정과 부가 정보를 계속 비교할 수 있습니다.</div></div></div>`;

      if (state.calendarMode === "list") {
        const days = Object.values(index.daysByKey)
          .filter(day => day.dateKey.startsWith(monthPrefix))
          .sort((a,b) => a.date - b.date)
          .map(day => {
            const ids = day.eventIds.filter(id => {
              const event = index.eventsById[id];
              return matchesTokens(event.dept, event.text);
            });
            if (!ids.length) return "";
            return `<button class="search-result" type="button" data-date-key="${day.dateKey}">
              <span class="search-result-date">${day.date.getMonth()+1}/${day.date.getDate()} ${weekdayName(day.date.getDay())}</span>
              <span class="search-result-main"><span class="search-result-type">${ids.length}개 일정</span><span class="search-result-text">${ids.slice(0,2).map(id => `[${escapeHTML(index.eventsById[id].dept)}] ${highlightHTML(index.eventsById[id].text)}`).join("<br>")}${ids.length>2?`<br>외 ${ids.length-2}건`:""}</span></span>
              <span class="search-result-arrow">›</span>
            </button>`;
          }).join("");
        el.root.innerHTML = `${toolbar}<div class="calendar-layout"><section class="panel calendar-panel">${title}<div class="search-result-list">${days || emptyState("등록된 일정이 없습니다.", "선택한 월의 일정 데이터가 없습니다.")}</div></section>${renderDayDrawer()}</div>`;
        return;
      }

      const firstDay = new Date(y, m, 1);
      const lastDay = new Date(y, m + 1, 0);
      const startDate = new Date(firstDay);
      while (!visibleDays.includes(startDate.getDay())) startDate.setDate(startDate.getDate() - 1);
      if (startDate.getTime() === firstDay.getTime()) {
        startDate.setDate(startDate.getDate() - (visibleDays.length === 5 ? 7 : visibleDays.length));
        while (!visibleDays.includes(startDate.getDay())) startDate.setDate(startDate.getDate() - 1);
      }

      let body = "";
      const cursor = new Date(startDate);
      let generated = 0;
      const maxCells = visibleDays.length * 6;
      while (generated < maxCells) {
        if (!visibleDays.includes(cursor.getDay())) { cursor.setDate(cursor.getDate() + 1); continue; }
        const dateKey = localDateKey(cursor);
        const day = index.daysByKey[dateKey];
        const ids = (day?.eventIds || []).filter(id => {
          const event = index.eventsById[id];
          return matchesTokens(event.dept, event.text);
        });
        const isToday = dateKey === localDateKey(new Date());
        const otherMonth = cursor.getMonth() !== m;
        const dow = cursor.getDay();
        const classes = ["cal-cell", isToday ? "today" : "", otherMonth ? "other-month" : "", dow === 0 ? "sun" : "", dow === 6 ? "sat" : "", state.selectedDateKey === dateKey ? "selected" : ""].filter(Boolean).join(" ");
        const shown = ids.slice(0, 3);
        body += `<article class="${classes}" data-date-key="${dateKey}" tabindex="0" aria-label="${cursor.getMonth()+1}월 ${cursor.getDate()}일 ${ids.length}개 일정">
          <div class="cal-date"><div class="date-num">${cursor.getDate()}</div><div class="day-count">${weekdayName(dow)} · ${ids.length}건</div></div>
          <div class="events">${shown.length ? shown.map(eventButton).join("") : `<div class="no-event">일정 없음</div>`}${ids.length > 3 ? `<button class="calendar-more" type="button" data-date-key="${dateKey}">+ ${ids.length - 3}개 일정 더 보기</button>` : ""}</div>
        </article>`;
        generated += 1;
        cursor.setDate(cursor.getDate() + 1);
        if (generated >= visibleDays.length * 5 && cursor > lastDay && cursor.getMonth() !== m) break;
      }
      const heads = visibleDays.map(day => `<div class="cal-head ${day === 0 ? "sun" : day === 6 ? "sat" : ""}">${weekdayName(day)}요일</div>`).join("");
      el.root.innerHTML = `${toolbar}<div class="calendar-layout"><section class="panel calendar-panel">${title}<div class="calendar-wrap"><div class="calendar-grid" style="--calendar-cols:${visibleDays.length}">${heads}${body}</div></div></section>${renderDayDrawer()}</div>`;
    }

    function renderDayDrawer() {
      const key = state.selectedDateKey;
      const date = dateFromKey(key);
      if (!date || Number.isNaN(date.getTime())) return `<aside class="day-drawer"><div class="drawer-empty">날짜를 선택하면 상세 정보가 표시됩니다.</div></aside>`;
      const ids = index.daysByKey[key]?.eventIds || [];
      const studentIds = index.studentDaysByKey[key]?.eventIds || [];
      const prayer = data.prayer[key] || {};
      const supervisor = data.supervisor[key] || "";
      const eventList = ids.length ? ids.map(id => {
        const event = index.eventsById[id];
        return `<button class="drawer-event" type="button" data-drawer-event-id="${id}"><span class="dept-tag" style="background:${deptColors[event.dept] || deptColors["기타"]}">${escapeHTML(event.dept)}</span><span class="event-text">${escapeHTML(event.text)}</span></button>`;
      }).join("") : `<div class="no-event">등록된 전체 일정이 없습니다.</div>`;
      const studentList = studentIds.length ? studentIds.map(id => `<div class="drawer-meta-card"><div class="drawer-meta-label">학생 일정</div><div class="drawer-meta-value">${escapeHTML(index.studentEventsById[id].text)}</div></div>`).join("") : "";
      const prayerText = [prayer.name ? `담당 ${prayer.name}` : "", prayer.hymn ? `찬송 ${prayer.hymn}` : "", prayer.bible ? `말씀 ${prayer.bible}` : ""].filter(Boolean).join("\n");
      return `<aside class="day-drawer open" id="dayDrawer" aria-label="선택 날짜 상세">
        <div class="drawer-head"><div class="drawer-eyebrow">Selected day</div><div class="drawer-date">${date.getMonth()+1}월 ${date.getDate()}일 ${weekdayName(date.getDay())}요일</div><div class="drawer-sub">전체 일정 ${ids.length}건${studentIds.length ? ` · 학생 일정 ${studentIds.length}건` : ""}</div></div>
        <div class="drawer-body">
          <section class="drawer-section"><div class="drawer-section-title">전체 일정</div>${eventList}</section>
          ${studentList ? `<section class="drawer-section"><div class="drawer-section-title">학생 일정</div>${studentList}</section>` : ""}
          ${(prayerText || supervisor) ? `<section class="drawer-section"><div class="drawer-section-title">당일 부가 정보</div>${prayerText ? `<div class="drawer-meta-card"><div class="drawer-meta-label">기도·말씀</div><div class="drawer-meta-value">${escapeHTML(prayerText)}</div></div>` : ""}${supervisor ? `<div class="drawer-meta-card"><div class="drawer-meta-label">자습감독</div><div class="drawer-meta-value">${escapeHTML(supervisor)}</div></div>` : ""}</section>` : ""}
        </div>
        <div class="drawer-foot"><button class="action-btn" type="button" data-action="drawer-close">닫기</button><button class="action-btn primary" type="button" data-action="print">이 날짜 인쇄</button></div>
      </aside>`;
    }

    function selectDate(dateKey) {
      if (!dateKey) return;
      state.selectedDateKey = dateKey;
      setPreference("selectedDateKey", dateKey);
      const date = dateFromKey(dateKey);
      if (date && (date.getFullYear() !== state.viewDate.getFullYear() || date.getMonth() !== state.viewDate.getMonth())) state.viewDate = new Date(date.getFullYear(), date.getMonth(), 1);
      state.currentTab = "calendar";
      render();
      requestAnimationFrame(() => document.getElementById("dayDrawer")?.classList.add("open"));
    }

    function renderSearchResults() {
      const schedule = Object.values(index.eventsById).filter(event => matchesTokens(event.dept, event.text)).map(event => ({kind:"전체 일정", dateKey:event.dateKey, text:event.text, dept:event.dept}));
      const students = Object.values(index.studentEventsById).filter(event => matchesTokens(event.text)).map(event => ({kind:"학생 일정", dateKey:event.dateKey, text:event.text, dept:"학생"}));
      const nuga = data.nuga.filter(item => matchesTokens(item.category, item.content, item.remark)).map(item => ({kind:"누가기록", dateKey:localDateKey(item.date), text:item.content, dept:item.category}));
      const results = [...schedule, ...students, ...nuga].sort((a,b) => a.dateKey.localeCompare(b.dateKey));
      const list = results.slice(0, 250).map(item => {
        const date = dateFromKey(item.dateKey);
