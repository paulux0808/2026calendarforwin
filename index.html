<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 스마트 학사관리 시스템 Pro</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border-heavy: #868e96;
            --text-main: #1a1d23;
            --text-muted: #495057;
            --sat-bg: #e7f5ff;
            --sun-bg: #fff5f5;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg: #1a1d23;
            --surface: #2c2e33;
            --border-heavy: #495057;
            --text-main: #e9ecef;
            --text-muted: #adb5bd;
            --sat-bg: #1864ab22;
            --sun-bg: #c92a2a22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* 상단 헤더 */
        .header-wrapper { background: var(--surface); z-index: 1000; border-bottom: 2px solid var(--border-heavy); padding: 8px 20px; flex-shrink: 0; }
        .header { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 15px; }

        .search-box { flex-grow: 1; max-width: 400px; }
        .search-input { width: 100%; padding: 8px 15px; border-radius: 10px; border: 2px solid var(--border-heavy); background: var(--bg); color: var(--text-main); font-size: 14px; outline: none; }

        /* 네비게이션 컨트롤 (이미지 기반 디자인) */
        .controls { 
            display: flex; 
            gap: 5px; 
            background: #f1f3f5; 
            padding: 4px; 
            border-radius: 30px; 
            border: 2px solid var(--border-heavy); 
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark-mode .controls { background: #343a40; }

        .btn { 
            background: transparent; 
            color: var(--text-muted); 
            border: none; 
            padding: 8px 16px; 
            border-radius: 25px; 
            font-weight: 800; 
            font-size: 14px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            white-space: nowrap;
        }
        .btn.active { background: #868e96; color: #fff; }
        body.dark-mode .btn.active { background: #495057; }

        /* 모바일 모드일 때 네비게이션 위치 변경 */
        body.mobile-mode-active .header .controls { display: none; } /* 상단에서 숨김 */
        .mobile-nav-container { display: none; }
        
        body.mobile-mode-active .mobile-nav-container { 
            display: flex; 
            position: fixed; 
            bottom: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 2000;
        }

        /* 컨테이너 및 그리드 */
        .container { flex-grow: 1; overflow-y: auto; width: 100%; padding: 15px 0; transition: padding 0.3s; }
        body.mobile-mode-active .container { padding-bottom: 100px; } /* 하단바 여백 */
        
        .limit-wrapper { max-width: 1400px; margin: 0 auto; width: 95%; }

        .calendar-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; grid-auto-rows: minmax(140px, auto); }
        .calendar-grid.mobile-grid-view { grid-template-columns: 1fr; }
        .calendar-grid.mobile-grid-view .cal-head { display: none; }

        .cal-head { padding: 10px; text-align: center; font-weight: 900; background: #f1f3f5; border: 2px solid var(--border-heavy); border-radius: 8px; }
        body.dark-mode .cal-head { background: #343a40; }

        .cal-cell { background: var(--surface); border: 2px solid var(--border-heavy); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        .cal-cell.today { border-color: #fcc419; border-width: 3px; background: rgba(252, 196, 25, 0.05); }
        .cal-cell.other-month { opacity: 0.3; }
        
        .cal-date { font-size: 15px; font-weight: 900; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .cal-date.sunday { color: #ff6b6b; }

        /* [중요] 들여쓰기 일정 스타일 */
        .cal-ev { 
            display: grid; 
            grid-template-columns: auto 1fr; 
            gap: 6px; 
            margin-bottom: 6px; 
            cursor: pointer; 
            line-height: 1.4;
        }
        .cal-ev.hidden { display: none; }
        .cal-ev:hover .cal-text { text-decoration: underline; }

        .cal-dept-tag { 
            padding: 1px 6px; border-radius: 4px; font-weight: 900; font-size: 10px; 
            color: #000; border: 1px solid rgba(0,0,0,0.1); white-space: nowrap; height: fit-content;
        }
        .cal-text { font-size: 12px; font-weight: 600; color: var(--text-main); }

        /* 계획표 디자인 */
        .table-container { border: 2px solid var(--border-heavy); border-radius: 12px; overflow-x: auto; background: var(--surface); }
        .plan-table { width: 100%; border-collapse: collapse; table-layout: auto; min-width: 700px; }
        .plan-table th { position: sticky; top: 0; background: #f1f3f5; padding: 12px; font-weight: 900; border-bottom: 2px solid var(--border-heavy); }
        body.dark-mode .plan-table th { background: #343a40; }
        .plan-table td { border-bottom: 1px solid var(--border-heavy); border-right: 1px solid var(--border-heavy); padding: 10px; text-align: center; }
        .plan-table tr.row-sun { background: var(--sun-bg); }
        
        .event-row { display: grid; grid-template-columns: auto 1fr; gap: 8px; text-align: left; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 4px; }
        .screen-dept { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; color: #000; border: 1px solid rgba(0,0,0,0.1); white-space: nowrap; }

        /* 공지사항 및 로딩 */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 5px solid #e9ecef; border-top-color: var(--border-heavy); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-weight:900; margin-top:15px;">학사 시스템을 연결하는 중...</div>
</div>

<!-- 상단 헤더: 검색 전용 -->
<div class="header-wrapper no-print">
    <div class="header">
        <h1 onclick="location.reload()" style="font-size:18px; font-weight:900; cursor:pointer; white-space:nowrap;">📅 스마트 학사</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="행사 내용이나 부서 검색..." oninput="handleSearch()">
        </div>

        <!-- 데스크톱용 네비게이션 -->
        <div class="controls" id="topControls">
            <button class="btn active" onclick="switchTab('calendar')">🗓️ 달력</button>
            <button class="btn" onclick="switchTab('plan')">📋 계획표</button>
            <button class="btn" onclick="switchTab('dept')">🏢 부서별</button>
            <button class="btn" onclick="switchTab('request')">✍️ 요청</button>
        </div>

        <div style="display:flex; gap:8px;">
            <button class="btn" onclick="toggleDarkMode()" style="padding:8px 12px;">🌙</button>
            <button class="btn" onclick="toggleMobileMode()" style="background:var(--border-heavy); color:#fff; padding:8px 12px;">📱</button>
        </div>
    </div>
</div>

<!-- 모바일 전용 하단 플로팅 네비게이션 -->
<div class="mobile-nav-container no-print" id="mobileNav">
    <div class="controls">
        <button class="btn active" id="m_btn_calendar" onclick="switchTab('calendar')">🗓️ 달력</button>
        <button class="btn" id="m_btn_plan" onclick="switchTab('plan')">📋 계획표</button>
        <button class="btn" id="m_btn_dept" onclick="switchTab('dept')">🏢 부서별</button>
        <button class="btn" id="m_btn_request" onclick="switchTab('request')">✍️ 요청</button>
    </div>
</div>

<div class="container" id="mainContainer"></div>

<!-- 공지사항 모달 -->
<div id="noticeModal" class="no-print" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:3000; justify-content:center; align-items:center; backdrop-filter:blur(2px);">
    <div style="background:var(--surface); width:90%; max-width:500px; border-radius:20px; border:3px solid var(--border-heavy); overflow:hidden;">
        <div style="padding:20px; border-bottom:2px solid var(--border-heavy); font-weight:900; font-size:20px;">📢 안내드립니다</div>
        <div style="padding:25px; font-size:17px; line-height:1.6; max-height:50vh; overflow-y:auto;" id="modalContent"></div>
        <div style="padding:15px; display:flex; justify-content:center;"><button class="btn active" onclick="document.getElementById('noticeModal').style.display='none'" style="padding:10px 50px;">확인</button></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz7y4g3X-UxdwBR97fdS0N667G4Y4Mia4p0IBIJlBvU8ZkG7NaVD_HITsxANGt_aue-LA/exec";
    const SHEET_ID = '10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg';
    const FIXED_DEPTS = ["교목부", "교무부", "연구부", "상담부", "정보부", "1학년부", "2학년부", "3학년부", "기획위원", "행정실", "국어과", "영어과", "수학과", "사회과", "과학과", "예체능과", "정보과", "외국어과", "기타"];
    const HOLIDAYS = ["2026-01-01", "2026-03-01", "2026-05-05", "2026-05-24", "2026-06-06", "2026-08-15", "2026-10-03", "2026-10-09", "2026-12-25"];

    let scheduleData = [], supervisorMap = {}, prayerMap = {}, deptColors = {}, dataLoaded = 0;
    let isMobileMode = false, searchQuery = "", currentTab = 'calendar', viewDate = new Date();

    const PASTELS = ['#ffadad', '#ffdada', '#ffd6a5', '#ffecd2', '#fdffb6', '#fdfdf0', '#caffbf', '#e9ffeb', '#9bf6ff', '#e0ffff', '#a0c4ff', '#e2edff', '#bdb2ff', '#ece8ff', '#ffc6ff', '#ffebff', '#ffb7e5', '#ffe4f3', '#e9ecef'];
    FIXED_DEPTS.forEach((d, i) => { deptColors[d] = PASTELS[i] || '#f1f3f5'; });

    function parseGDate(v) {
        if (!v || typeof v !== 'string' || !v.includes('Date')) return null;
        const parts = v.match(/\d+/g);
        return new Date(parts[0], parts[1], parts[2]);
    }

    function checkReady() {
        dataLoaded++;
        if (dataLoaded >= 4) {
            document.getElementById('loadingOverlay').style.display = 'none';
            switchTab('calendar');
        }
    }

    window.cb_schedule = function(data) {
        data.table.rows.forEach(r => {
            if (!r.c || !r.c[0]) return;
            const date = parseGDate(r.c[0].v);
            const content = r.c[2] ? String(r.c[2].v).trim() : "";
            if (date && content && content !== "null") {
                const dayEvents = content.split('\n').filter(l => l.trim() && l !== "null").map(line => {
                    const deptMatch = line.match(/^\[([^\]]+)\]/);
                    let deptName = deptMatch ? deptMatch[1].trim() : '기타';
                    let text = deptMatch ? line.replace(deptMatch[0], '').trim() : line.trim();
                    if (!FIXED_DEPTS.includes(deptName)) { deptName = '기타'; text = line; }
                    return { dept: deptName, text: text };
                });
                scheduleData.push({ date, events: dayEvents });
            }
        });
        checkReady();
    };

    window.cb_super = function(data) {
        data.table.rows.forEach(r => {
            if (!r.c || !r.c[0]) return;
            const date = parseGDate(r.c[0].v);
            const name = r.c[2] ? String(r.c[2].v).trim() : "";
            if (date && name && name !== "null") supervisorMap[date.toISOString().split('T')[0]] = name;
        });
        checkReady();
    };

    window.cb_prayer = function(data) {
        data.table.rows.forEach((r, i) => {
            if (i < 1 || !r.c || !r.c[0]) return;
            const dateObj = parseGDate(r.c[0].v);
            if (!dateObj) return;
            const dateKey = dateObj.toISOString().split('T')[0];
            const name = r.c[2] ? String(r.c[2].v).trim() : ""; 
            const bible = r.c[3] ? String(r.c[3].v).trim() : ""; 
            const hymn = r.c[4] ? String(r.c[4].v).trim() : ""; 
            if (name && name !== "null") prayerMap[dateKey] = { name, hymn, bible };
        });
        checkReady();
    };

    window.cb_notice = function(data) {
        if (data.table.rows && data.table.rows.length > 0) {
            let combinedHTML = "";
            const today = new Date(); today.setHours(0,0,0,0);
            data.table.rows.forEach((r) => {
                if (!r || !r.c || r.c.length < 3) return;
                const startDate = parseGDate(r.c[0] ? r.c[0].v : null);
                const endDate = parseGDate(r.c[1] ? r.c[1].v : null);
                const content = r.c[2] ? String(r.c[2].v).trim() : "";
                if (content && content !== "null") {
                    let isVisible = (startDate && endDate) ? (today >= startDate && today <= endDate) : true;
                    if (isVisible) {
                        if (combinedHTML !== "") combinedHTML += '<hr style="margin:15px 0; opacity:0.1;">';
                        combinedHTML += content;
                    }
                }
            });
            if (combinedHTML) {
                document.getElementById('modalContent').innerHTML = combinedHTML;
                document.getElementById('noticeModal').style.display = 'flex';
            }
        }
        checkReady();
    };

    function fetchAll() {
        const sheets =[{gid:'0',cb:'cb_schedule'}, {gid:'1459415616',cb:'cb_super'}, {gid:'1697887995',cb:'cb_prayer'}, {gid:'1487091944',cb:'cb_notice'}];
        sheets.forEach(s => {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${s.cb}&gid=${s.gid}&_=${Date.now()}`;
            document.body.appendChild(script);
        });
    }
    fetchAll();

    // --- UI 로직 ---
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleMobileMode() { 
        isMobileMode = !isMobileMode; 
        document.body.classList.toggle('mobile-mode-active', isMobileMode);
        render(); 
    }
    function handleSearch() {
        searchQuery = document.getElementById('searchInput').value.toLowerCase();
        render();
    }
    
    function switchTab(id) {
        currentTab = id;
        document.querySelectorAll('.controls .btn').forEach(b => {
            b.classList.remove('active');
            if(b.innerText.includes(id === 'calendar' ? '달력' : id === 'plan' ? '계획' : id === 'dept' ? '부서' : '요청')) b.classList.add('active');
        });
        render();
    }

    function render() {
        const mc = document.getElementById('mainContainer'); mc.innerHTML = '';
        if(currentTab === 'calendar') renderCalendar(mc);
        else if(currentTab === 'plan') renderPlan(mc);
        else if(currentTab === 'dept') renderDept(mc);
        else if(currentTab === 'request') renderRequestForm(mc);
    }

    window.changeMonth = (v) => { viewDate.setMonth(viewDate.getMonth() + v); render(); };
    window.goDept = (deptName) => { window._selDept = deptName; switchTab('dept'); };

    // --- 렌더링 함수 ---
    function renderCalendar(c) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth(), now = new Date();
        let html = `<div class="limit-wrapper">
            <div class="month-selector no-print">
                <button class="btn" onclick="changeMonth(-1)">◀</button>
                <div class="month-title">${y}년 ${m + 1}월</div>
                <button class="btn" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid ${isMobileMode ? 'mobile-grid-view' : ''}">${['월','화','수','목','금'].map(d => `<div class="cal-head">${d}</div>`).join('')}`;
        
        const firstDay = new Date(y, m, 1), lastDay = new Date(y, m + 1, 0);
        let curr = new Date(firstDay);
        let diff = curr.getDay() - 1; if(diff === -1) diff = 6;
        curr.setDate(curr.getDate() - diff);

        for(let i=0; i<35; i++) {
            const dStr = curr.toISOString().split('T')[0];
            const isToday = curr.toDateString() === now.toDateString();
            const isSunday = curr.getDay() === 0 || HOLIDAYS.includes(dStr);
            const isWeekend = curr.getDay() === 0 || curr.getDay() === 6;

            if(isMobileMode || !isWeekend) {
                const dayData = scheduleData.find(x => x.date.toISOString().split('T')[0] === dStr);
                const hasMatch = dayData && dayData.events.some(e => e.text.toLowerCase().includes(searchQuery) || e.dept.toLowerCase().includes(searchQuery));
                
                if(!isMobileMode || (isMobileMode && (!searchQuery || hasMatch))) {
                    html += `<div class="cal-cell ${curr.getMonth()!==m?'other-month':''} ${isToday?'today':''}">
                        <div class="cal-date ${isSunday?'sunday':''}">
                            <span>${curr.getDate()} ${isMobileMode?'('+['일','월','화','수','목','금','토'][curr.getDay()]+')':''}</span>
                        </div>
                        ${dayData ? dayData.events.map(e => {
                            const match = e.text.toLowerCase().includes(searchQuery) || e.dept.toLowerCase().includes(searchQuery);
                            return `<div class="cal-ev ${!match && searchQuery ? 'hidden' : ''}" onclick="goDept('${e.dept}')">
                                <div class="cal-dept-tag" style="background:${deptColors[e.dept]}">${e.dept}</div>
                                <div class="cal-text">${e.text}</div>
                            </div>`;
                        }).join('') : ''}
                    </div>`;
                }
            }
            curr.setDate(curr.getDate() + 1);
            if(!isMobileMode && curr > lastDay && curr.getDay() === 1) break;
            if(isMobileMode && curr > lastDay) break;
        }
        c.innerHTML = html + `</div></div>`;
    }

    function renderPlan(c) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const lastDay = new Date(y, m + 1, 0).getDate();
        let html = `<div class="limit-wrapper">
            <div class="month-selector no-print">
                <button class="btn" onclick="changeMonth(-1)">◀</button>
                <div class="month-title">${y}년 ${m + 1}월</div>
                <button class="btn" onclick="changeMonth(1)">▶</button>
                <button class="btn active" style="margin-left:10px;" onclick="window.print()">🖨️ 인쇄</button>
            </div>
            <div class="table-container"><table class="plan-table"><thead><tr><th style="width:50px">날짜</th><th style="width:40px">요일</th><th>주요 행사</th><th style="width:120px">기도</th><th style="width:100px">자습</th></tr></thead><tbody>`;
        
        for(let d=1; d<=lastDay; d++) {
            const date = new Date(y, m, d), dISO = date.toISOString().split('T')[0];
            const dayData = scheduleData.find(x => x.date.toISOString().split('T')[0] === dISO);
            const prayer = prayerMap[dISO] || {name:"", hymn:"", bible:""};
            const isSunday = date.getDay() === 0 || HOLIDAYS.includes(dISO);
            
            html += `<tr class="${isSunday?'row-sun':''}">
                <td style="font-weight:900; ${isSunday?'color:#ff6b6b;':''}">${d}</td>
                <td>${['일','월','화','수','목','금','토'][date.getDay()]}</td>
                <td><div style="display:flex; flex-direction:column; gap:6px;">${dayData ? dayData.events.map(e => `
                    <div class="event-row" onclick="goDept('${e.dept}')">
                        <div class="screen-dept" style="background:${deptColors[e.dept]}">${e.dept}</div>
                        <div>${e.text}</div>
                    </div>`).join('') : ''}</div></td>
                <td><div style="font-size:12px;"><b>${prayer.name}</b><br>${prayer.hymn}</div></td>
                <td style="font-weight:700;">${supervisorMap[dISO] || ""}</td>
            </tr>`;
        }
        c.innerHTML = html + `</tbody></table></div></div>`;
    }

    function renderDept(c) {
        if(!window._selDept) window._selDept = FIXED_DEPTS[0];
        const filtered = scheduleData.filter(day => day.events.some(e => e.dept === window._selDept)).sort((a,b) => a.date - b.date);
        const monthGroups = {};
        filtered.forEach(item => {
            const mKey = `${item.date.getFullYear()}년 ${item.date.getMonth()+1}월`;
            if(!monthGroups[mKey]) monthGroups[mKey] = [];
            monthGroups[mKey].push(item);
        });

        let html = `<div class="limit-wrapper"><div class="month-selector no-print" style="justify-content:flex-start;"><label style="font-weight:900; margin-right:15px;">🏢 부서:</label>
            <select class="btn" style="background:var(--surface); border:2px solid var(--border-heavy);" onchange="window._selDept=this.value; render();">${FIXED_DEPTS.map(d => `<option value="${d}" ${window._selDept===d?'selected':''}>${d}</option>`).join('')}</select></div>`;
        
        if(Object.keys(monthGroups).length === 0) html += `<div style="text-align:center; padding:60px; color:#868e96; font-weight:800; border:2px dashed var(--border-heavy); border-radius:15px;">일정이 없습니다.</div>`;
        else {
            Object.keys(monthGroups).forEach(mKey => {
                html += `<div style="font-size:18px; font-weight:900; border-bottom:4px solid var(--border-heavy); margin:20px 0 10px; padding-bottom:5px;">${mKey}</div><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:12px;">`;
                monthGroups[mKey].forEach(item => {
                    const events = item.events.filter(e => e.dept === window._selDept);
                    html += `<div style="background:var(--surface); border:2px solid var(--border-heavy); border-radius:15px; padding:15px; border-left:10px solid ${deptColors[window._selDept]}">
                        <div style="font-weight:900; margin-bottom:8px;">${item.date.getMonth()+1}월 ${item.date.getDate()}일 (${['일','월','화','수','목','금','토'][item.date.getDay()]})</div>
                        ${events.map(e => `<div style="font-weight:700;">• ${e.text}</div>`).join('')}
                    </div>`;
                });
                html += `</div>`;
            });
        }
        c.innerHTML = html + `</div>`;
    }

    function renderRequestForm(c) {
        c.innerHTML = `<div class="limit-wrapper"><div style="background:var(--surface); border:3px solid var(--border-heavy); border-radius:20px; padding:30px; max-width:500px; margin:20px auto; box-shadow:var(--shadow);">
            <h2 style="text-align:center; margin-bottom:20px;">✍️ 요청하기</h2>
            <div style="margin-bottom:15px;"><label style="display:block; font-weight:900; margin-bottom:5px;">성함</label><input type="text" id="reqName" style="width:100%; padding:12px; border:2px solid var(--border-heavy); border-radius:10px; background:var(--bg); color:var(--text-main);"></div>
            <div style="margin-bottom:20px;"><label style="display:block; font-weight:900; margin-bottom:5px;">내용</label><textarea id="reqContent" style="width:100%; height:120px; padding:12px; border:2px solid var(--border-heavy); border-radius:10px; background:var(--bg); color:var(--text-main); resize:none;"></textarea></div>
            <button class="btn active" id="submitBtn" onclick="submitRequest()" style="width:100%; padding:15px; font-size:16px; justify-content:center;">전송하기</button>
        </div></div>`;
    }

    async function submitRequest() {
        const name = document.getElementById('reqName').value;
        const content = document.getElementById('reqContent').value;
        if(!name || !content) { alert("내용을 채워주세요."); return; }
        const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "전송 중...";
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, type: '일정수정', content }) });
            alert("전송되었습니다."); switchTab('calendar');
        } catch (e) { alert("오류 발생"); }
        finally { btn.disabled = false; btn.innerText = "전송하기"; }
    }
</script>
</body>
</html>
