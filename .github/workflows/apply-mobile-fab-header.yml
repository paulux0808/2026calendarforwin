name: Apply floating mobile menu and collapsible header
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-mobile-fab-header.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/apply_mobile_fab_header.py
      - name: Validate final file
        run: |
          node <<'NODE'
          const fs=require('fs');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(m=>m[1]).filter(Boolean);
          scripts.forEach((code,index)=>{try{new Function(code)}catch(error){console.error(`Script ${index}:`,error.message);process.exit(1)}});
          ['MOBILE_FLOATING_MENU_V1','MOBILE_HEADER_COLLAPSE_V1','id="mobileMenuFab"','id="mobileHeaderToggle"'].forEach(marker=>{if(!html.includes(marker)){console.error('Missing marker:',marker);process.exit(1)}});
          console.log(`Validated ${scripts.length} script blocks and mobile shell markers`);
          NODE
      - name: Remove temporary files and commit
        run: |
          rm -f .github/apply_mobile_fab_header.py .github/workflows/apply-mobile-fab-header.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add floating mobile menu and collapsible header [skip ci]'
          git push
