name: Apply UX consistency pass

on:
  push:
    branches:
      - main
    paths:
      - scripts/apply_ux_consistency_pass.py
      - .github/workflows/apply-ux-consistency-pass.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply verified UX consistency patch
        run: python scripts/apply_ux_consistency_pass.py
      - name: Validate JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          s=Path('index.html').read_text(encoding='utf-8')
          parts=re.findall(r'<script(?:[^>]*)>(.*?)</script>',s,flags=re.S)
          Path('/tmp/index-inline.js').write_text('\n'.join(parts),encoding='utf-8')
          PY
          node --check /tmp/index-inline.js
      - name: Commit final single-file app and remove staging files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f scripts/apply_ux_consistency_pass.py
          rm -f .github/workflows/apply-ux-consistency-pass.yml
          git add -A
          git commit -m "fix: make mobile navigation and viewport behavior consistent [skip ci]"
          git push origin main
