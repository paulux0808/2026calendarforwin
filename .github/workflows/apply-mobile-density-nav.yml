name: Apply compact mobile calendar and safe navigation

on:
  push:
    branches:
      - main
    paths:
      - scripts/apply_mobile_density_nav.py
      - .github/workflows/apply-mobile-density-nav.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply tested mobile density and navigation patch
        run: python scripts/apply_mobile_density_nav.py
      - name: Validate the single-file app
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          assert text.count('/* MOBILE_DENSITY_NAV_V1 */') == 1
          assert text.count('function compactMobileCalendar()') == 1
          scripts = re.findall(r'<script(?: [^>]*)?>([\s\S]*?)</script>', text)
          Path('/tmp/app-scripts.js').write_text('\n;\n'.join(scripts), encoding='utf-8')
          print('scripts:', len(scripts), 'index bytes:', len(text.encode('utf-8')))
          PY
          node --check /tmp/app-scripts.js
      - name: Commit final single-file app and remove staging files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f scripts/apply_mobile_density_nav.py
          rm -f .github/workflows/apply-mobile-density-nav.yml
          git add -A
          git commit -m "fix: compact empty mobile days and stabilise bottom navigation [skip ci]"
          git push origin main
