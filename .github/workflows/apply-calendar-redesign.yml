name: Apply calendar redesign

on:
  push:
    branches:
      - feature/gpt56-calendar-redesign
    paths:
      - .github/workflows/apply-calendar-redesign.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild index.html
        shell: bash
        run: |
          cat .deploy_chunks/00 .deploy_chunks/01 .deploy_chunks/02 | base64 -d | gzip -d > index.html
          test "$(wc -c < index.html)" -gt 100000
          grep -q 'day-drawer' index.html
          grep -q '10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg' index.html
      - name: Commit rebuilt app
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf .deploy_chunks .github/workflows/apply-calendar-redesign.yml
          git add -A
          git commit -m 'feat: redesign academic calendar experience [skip ci]'
          git push origin HEAD:feature/gpt56-calendar-redesign
