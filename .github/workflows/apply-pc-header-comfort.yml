name: Apply PC header comfort update
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-pc-header-comfort.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/apply_pc_header_comfort.py
      - name: Validate JavaScript syntax and structural markers
        run: |
          node <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const scripts = [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)]
            .map(m => m[1]).filter(Boolean);
          scripts.forEach((code, index) => {
            try { new Function(code); }
            catch (error) {
              console.error(`Script ${index} syntax error:`, error.message);
              process.exit(1);
            }
          });
          const required = [
            'PC_HEADER_COMFORT_V1',
            'class="header-top-row"',
            'grid-template-columns:repeat(6,minmax(0,1fr))',
            'grid-template-columns:repeat(3,minmax(0,1fr))'
          ];
          required.forEach(x => {
            if (!html.includes(x)) {
              console.error('Missing required marker:', x);
              process.exit(1);
            }
          });
          console.log(`Validated ${scripts.length} script blocks and PC header markers`);
          NODE
      - name: Remove temporary files and commit
        run: |
          rm -f .github/apply_pc_header_comfort.py .github/workflows/apply-pc-header-comfort.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: prioritize readable PC navigation over compression [skip ci]'
          git push
