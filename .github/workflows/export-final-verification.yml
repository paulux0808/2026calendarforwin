name: Export final index verification
on:
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: final-index-verification
          path: index.html
          if-no-files-found: error
          retention-days: 1
