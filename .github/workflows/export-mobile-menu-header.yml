name: Export current index for mobile menu and header
on:
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-index-mobile-menu-header
          path: index.html
