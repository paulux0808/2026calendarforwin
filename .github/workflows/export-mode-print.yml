name: Export current index for mode and print fix
on:
  pull_request:
    branches: [ main ]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-index-mode-print
          path: index.html
          retention-days: 1
