name: Apply mode and mobile print fix
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-mode-print-fix.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/apply_mode_print_fix.py
      - name: Validate JavaScript syntax
        run: |
          node <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const scripts = [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)]
            .map(m => m[1]).filter(Boolean);
          scripts.forEach((code, index) => {
            try { new Function(code); }
            catch (error) {
              console.error(`Script ${index} syntax error:`, error.message);
              process.exit(1);
            }
          });
          console.log(`Validated ${scripts.length} script blocks`);
          NODE
      - name: Remove temporary files and commit
        run: |
          rm -f .github/apply_mode_print_fix.py .github/workflows/apply-mode-print-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: hide mobile print actions and restore mode switching [skip ci]'
          git push
