name: Export current index for UX pass

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-index-ux-pass
          path: index.html
          retention-days: 1
