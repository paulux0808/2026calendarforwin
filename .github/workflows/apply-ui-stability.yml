name: Apply UI stability fixes
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-ui-stability.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/apply_ui_stability.py
      - name: Validate JavaScript and required behavior
        run: |
          node <<'NODE'
          const fs=require('fs');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(m=>m[1]).filter(Boolean);
          scripts.forEach((code,index)=>{try{new Function(code)}catch(error){console.error(`Script ${index}: ${error.message}`);process.exit(1)}});
          const required=[
            'MOBILE_FLOATING_MENU_V2','MOBILE_SHELL_STABILITY_V2','UI_STABILITY_V1',
            'class="mobile-menu-mode"','function decorateTabSettings()',
            'position:sticky;top:0','세부 설정','PC 화면',
            "const SHEET_ID = '10blDNZ4zjrFU5lwCvgtoD3npwIwcCMQTeqwPgpQ_Ffg'",
            'AKfycbzk1DN0iDS7EdZvKq-iomzgxmiCzOwCUZwWZkN4fjvkzOZPdF1d3P9d1xt6Ii8VNnmmPQ'
          ];
          required.forEach(x=>{if(!html.includes(x)){console.error('Missing:',x);process.exit(1)}});
          const forbidden=['MOBILE_HEADER_COLLAPSE_V1',"syncMobileNavLayout=function(){if(!mobileShell(){"];
          forbidden.forEach(x=>{if(html.includes(x)){console.error('Forbidden stale logic:',x);process.exit(1)}});
          if((html.match(/id="m_btn_/g)||[]).length!==6){console.error('Mobile menu must retain six tabs');process.exit(1)}
          console.log(`Validated ${scripts.length} script blocks and UI stability markers`);
          NODE
      - name: Remove temporary files and commit
        run: |
          rm -f .github/apply_ui_stability.py .github/workflows/apply-ui-stability.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: stabilise view switching and compact tab controls [skip ci]'
          git push
