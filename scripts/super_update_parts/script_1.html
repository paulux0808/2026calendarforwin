<script id="superUpdateScript">
(()=>{
'use strict';
const PREF='academic-calendar-super-v1',DOW=['일','월','화','수','목','금','토'];
let scaleMode='auto',mobileLocked=false,searchTimer=null,resizeTimer=null,panelDate='',panelEvent=null,panelStudent=null,lastRefresh=0,restoredView=null,firstDataAlignment=true,loadGeneration=0,activeDynamicScripts=[];
const q=(x,r=document)=>r.querySelector(x),qa=(x,r=document)=>[...r.querySelectorAll(x)],clamp=(a,b,v)=>Math.max(a,Math.min(b,v));
function read(){try{return JSON.parse(localStorage.getItem(PREF)||'{}')}catch{return{}}}
function save(){try{localStorage.setItem(PREF,JSON.stringify({dark:document.body.classList.contains('dark-mode'),scaleLevel,scaleMode,isMobileMode,mobileLocked,currentTab,y:viewDate.getFullYear(),m:viewDate.getMonth(),optShowDept,optShowPrayer,optShowSuper,optExcludeWeekends,optHorizontalEvents,optStudentExcludeWeekends,optStudentHorizontalEvents,optYearlyView,nugaGrade,nugaCategory,dept:window._selDept||''}))}catch{}}
function restore(){const p=read();document.body.classList.toggle('dark-mode',p.dark===true);if(Number.isFinite(p.scaleLevel))scaleLevel=clamp(-2,2,+p.scaleLevel);scaleMode=p.scaleMode==='manual'?'manual':'auto';mobileLocked=!!p.mobileLocked;if(mobileLocked&&typeof p.isMobileMode==='boolean'){isMobileMode=p.isMobileMode;document.body.classList.toggle('mobile-mode-active',isMobileMode)}if(['calendar','plan','student','dept','nuga','request'].includes(p.currentTab))currentTab=p.currentTab;if(Number.isInteger(p.y)&&Number.isInteger(p.m)){restoredView=new Date(p.y,p.m,1);viewDate=new Date(p.y,p.m,1)}if(typeof p.optShowDept==='boolean')optShowDept=p.optShowDept;if(typeof p.optShowPrayer==='boolean')optShowPrayer=p.optShowPrayer;if(typeof p.optShowSuper==='boolean')optShowSuper=p.optShowSuper;if(typeof p.optExcludeWeekends==='boolean')optExcludeWeekends=p.optExcludeWeekends;if(typeof p.optHorizontalEvents==='boolean')optHorizontalEvents=p.optHorizontalEvents;if(typeof p.optStudentExcludeWeekends==='boolean')optStudentExcludeWeekends=p.optStudentExcludeWeekends;if(typeof p.optStudentHorizontalEvents==='boolean')optStudentHorizontalEvents=p.optStudentHorizontalEvents;if(typeof p.optYearlyView==='boolean')optYearlyView=p.optYearlyView;if([1,2,3].includes(+p.nugaGrade))nugaGrade=+p.nugaGrade;if(typeof p.nugaCategory==='string')nugaCategory=p.nugaCategory;if(FIXED_DEPTS.includes(p.dept))window._selDept=p.dept}
function autoLevel(){return innerWidth<1040||innerHeight<690?-2:innerWidth<1360||innerHeight<800?-1:0}
function scaleLabel(){const x=q('#superScaleLabel'),b=q('#superFitBtn');if(x)x.textContent=`${scaleMode==='auto'?'맞춤':'수동'} ${scaleLevel>=0?'+':''}${scaleLevel}`;if(b)b.classList.toggle('super-fit-active',scaleMode==='auto')}
function fitCells(){if(scaleMode!=='auto'||currentTab!=='calendar'||isMobileMode||optYearlyView)return;const g=q('.calendar-grid');if(!g)return;const rows=Math.max(1,Math.ceil(qa('.cal-cell',g).length/5)),gap=8+scaleLevel,available=Math.max(360,innerHeight-g.getBoundingClientRect().top-18),h=clamp(92,205,Math.floor((available-gap*(rows-1))/rows));document.documentElement.style.setProperty('--cell-min-h',h+'px')}
const oldApply=applyScale;applyScale=function(){if(scaleMode==='auto')scaleLevel=autoLevel();oldApply();scaleLabel();requestAnimationFrame(fitCells);save()};adjustScale=function(d){scaleMode='manual';scaleLevel=clamp(-2,2,scaleLevel+d);applyScale()};function fitScreen(){scaleMode='auto';applyScale()}
const oldDark=toggleDarkMode;toggleDarkMode=function(){oldDark();save()};const oldMobile=toggleMobileMode;toggleMobileMode=function(){mobileLocked=true;oldMobile();closePanel();save()};const oldSwitch=switchTab;switchTab=function(id){closePanel();oldSwitch(id);save()};const oldMonth=window.changeMonth;window.changeMonth=function(v){closePanel();oldMonth(v);save()};const oldToday=goToday;goToday=function(){oldToday();save()};const oldRender=render;render=function(){oldRender();enhance();save()};
const oldAlign=alignViewDateToLoadedData;alignViewDateToLoadedData=function(){if(!firstDataAlignment)return;firstDataAlignment=false;if(restoredView){viewDate=new Date(restoredView);restoredView=null;return}oldAlign()};
function cleanupDynamic(){activeDynamicScripts.forEach(x=>{try{x.script.remove()}catch{}try{delete window[x.cb]}catch{}});activeDynamicScripts=[]}
